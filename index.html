:root {
  --bg: #f8f7f4; --card-bg: #ffffff; --text-primary: #1a1a2e;
  --text-secondary: #6b7280; --text-muted: #9ca3af; --gold: #c8a44a;
  --gold-light: #fef9ed; --gold-border: #e8d5a0; --border: #e5e7eb;
  --border-light: #f0f0f0;
  --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
  --shadow-hover: 0 4px 12px rgba(0,0,0,0.06), 0 2px 4px rgba(0,0,0,0.04);
  --radius: 12px; --radius-sm: 8px;
  --font-display: Georgia,"PingFang SC","Noto Serif CJK SC",serif;
  --font-body: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  --font-mono: "SF Mono","Menlo","Monaco",monospace;
  --safe-top: env(safe-area-inset-top,0px); --safe-bottom: env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:calc(40px + var(--safe-bottom));overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.008) 2px,rgba(0,0,0,0.008) 4px);pointer-events:none;z-index:0}

.header{position:relative;z-index:10;padding:calc(28px + var(--safe-top)) 24px 20px;background:var(--card-bg);border-bottom:1px solid var(--border-light)}
.header::after{content:'';position:absolute;bottom:-1px;left:24px;right:24px;height:3px;background:linear-gradient(90deg,var(--gold) 0%,transparent 100%);border-radius:2px;opacity:.6}
.header h1{font-family:var(--font-display);font-size:26px;font-weight:700;letter-spacing:1px;color:var(--text-primary);line-height:1.2}
.header h1 span{color:var(--gold)}
.header .subtitle{font-size:13px;color:var(--text-secondary);margin-top:4px;letter-spacing:.3px}
.header .badge{display:inline-block;font-size:10px;color:var(--gold);border:1px solid var(--gold-border);border-radius:4px;padding:1px 7px;margin-top:6px;letter-spacing:.3px;font-family:var(--font-mono)}

.progress-bar{position:fixed;top:0;left:0;right:0;height:3px;z-index:100;background:transparent}
.progress-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),#dbb85a);transition:width 100ms ease;border-radius:0 2px 2px 0}

.tabs{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border-light);display:flex;padding:0 16px}
.tabs .tab{flex:1;text-align:center;padding:14px 8px 12px;font-size:15px;font-weight:500;color:var(--text-muted);border:none;background:none;cursor:pointer;position:relative;transition:color .2s;-webkit-tap-highlight-color:transparent;outline:none;font-family:var(--font-body)}
.tabs .tab::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%) scaleX(0);width:40%;height:2.5px;background:var(--text-primary);border-radius:2px;transition:transform .25s cubic-bezier(.22,1,.36,1)}
.tabs .tab.active{color:var(--text-primary);font-weight:600}
.tabs .tab.active::after{transform:translateX(-50%) scaleX(1)}.tabs .tab:active{opacity:.7}

.content{position:relative;z-index:1;padding:12px 14px 40px;max-width:500px;margin:0 auto}
.module{display:none;animation:fadeSlideIn .35s ease}.module.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.thread-header{display:flex;align-items:center;gap:10px;margin:20px 0 12px;padding:0 2px}
.thread-header:first-of-type{margin-top:2px}
.thread-header .icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.thread-header .icon.fundamental{background:#eef2ff;color:#6366f1}
.thread-header .icon.technical{background:#fef3c7;color:#d97706}
.thread-header h2{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--text-primary);letter-spacing:.3px}
.thread-header .count{font-size:11px;color:var(--text-muted);font-family:var(--font-mono);margin-left:auto}

.card-wrap{margin-bottom:10px;opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.card-wrap.visible{opacity:1;transform:translateY(0)}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .25s ease}
.card:active{box-shadow:var(--shadow-hover)}
.card-header{display:flex;align-items:center;gap:10px;padding:12px 12px 12px 14px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .2s}
.card-header:active{background:rgba(0,0,0,.02)}
.card-header .num{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);min-width:20px;font-weight:500}
.card-header .title{flex:1;font-size:14px;font-weight:500;color:var(--text-primary);line-height:1.3}
.card-header .arrow{font-size:11px;color:var(--text-muted);transition:transform .3s cubic-bezier(.22,1,.36,1);flex-shrink:0}
.card.open .card-header .arrow{transform:rotate(180deg)}
.card-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1),padding .3s ease;padding:0 14px}
.card.open .card-body{max-height:2500px;padding:0 14px 14px}

.card-body .brief{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border-light)}
.card-body .section-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
.card-body .section-label::after{content:'';flex:1;height:1px;background:var(--border-light)}
.card-body .practical-box{font-size:12.5px;line-height:1.7;background:#f0f7ff;border-left:3px solid #6366f1;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:10px;color:#374151}
.card-body .ref-box{font-size:12.5px;line-height:1.7;background:#f5f3ff;border-left:3px solid #8b5cf6;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:10px;color:#374151}
.card-body .combo-box{font-size:12.5px;line-height:1.7;background:#f0fdf4;border-left:3px solid #22c55e;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:10px;color:#374151}
.card-body .tag-case,.card-body .tag-boundary{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;margin-bottom:6px;letter-spacing:.3px}
.card-body .tag-case{background:var(--gold-light);color:#8b6e2a;border:1px solid var(--gold-border)}
.card-body .tag-boundary{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.card-body .case-box,.card-body .boundary-box{font-size:12.5px;line-height:1.7;padding:8px 10px;border-radius:var(--radius-sm);margin-bottom:10px}
.card-body .case-box{background:var(--gold-light);border-left:3px solid var(--gold);color:#5a4a2a}
.card-body .boundary-box{background:#f9fafb;border-left:3px solid #d1d5db;color:#4b5563}
.card-body .case-box:last-child,.card-body .boundary-box:last-child{margin-bottom:0}
.card-body .num-highlight{font-weight:700;color:#dc2626}
.card-body .num-gold{font-weight:700;color:var(--gold)}

.card-body .diagram-box{background:#fafaf8;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;margin-bottom:10px;text-align:center}
.card-body .diagram-box svg{max-width:100%;height:auto;display:block;margin:0 auto}
.card-body .diagram-caption{font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:.2px}

.footer{text-align:center;padding:24px 16px 32px;font-size:12px;color:var(--text-muted);line-height:1.6;max-width:500px;margin:0 auto;border-top:1px solid var(--border-light)}
.footer strong{color:var(--text-secondary);font-weight:500}

@media(min-width:430px){
  .content{padding:16px 20px 48px}
  .header{padding:calc(32px + var(--safe-top)) 28px 24px}
  .header h1{font-size:30px}
  .card-header{padding:14px 14px 14px 18px}
  .card-body .brief{font-size:13.5px}
  .card.open .card-body{max-height:3000px;padding:0 18px 18px}
}
.card-wrap{will-change:opacity,transform}
</style>
</head>

// ======================== 渲染引擎 ========================
const contentEl = document.getElementById('content');
const tabs = document.querySelectorAll('.tab');
const progressFill = document.getElementById('progressFill');

function renderDiagram(diagram) {
  if (!diagram) return '';
  return `<div class="diagram-box">${diagram}<div class="diagram-caption">↑ 图解说明</div></div>`;
}

function renderModule(key) {
  const mod = data[key];
  if (!mod) return '';
  let html = `<div class="module active" data-module="${key}">`;
  for (const [tk, th] of Object.entries(mod.threads)) {
    html += `<div class="thread-header"><div class="icon ${tk}">${th.icon}</div><h2>${th.label}</h2><span class="count">${th.points.length} 个知识点</span></div>`;
    th.points.forEach((pt, i) => {
      html += `<div class="card-wrap" data-id="${pt.id}"><div class="card" data-point-id="${pt.id}">
        <div class="card-header"><span class="num">${i+1}</span><span class="title">${pt.title}</span><span class="arrow">▼</span></div>
        <div class="card-body">
          <div class="brief">${pt.brief}</div>
          <div class="section-label">🎯 实战操作指南</div>
          <div class="practical-box">${pt.practical}</div>
          <div class="section-label">📏 关键数值参考</div>
          <div class="ref-box">${pt.ref}</div>
          <div class="section-label">🔗 多指标组合</div>
          <div class="combo-box">${pt.combo}</div>
          ${pt.diagram ? renderDiagram(pt.diagram) : ''}
          <div class="tag-case">📋 实战案例</div>
          <div class="case-box">${pt.case}</div>
          <div class="tag-boundary">⚠️ 使用边界</div>
          <div class="boundary-box">${pt.boundary}</div>
        </div>
      </div></div>`;
    });
  }
  html += '</div>';
  return html;
}

function switchModule(key) {
  tabs.forEach(t => t.classList.toggle('active', t.dataset.module === key));
  contentEl.innerHTML = renderModule(key);
  contentEl.querySelectorAll('.card-header').forEach(h => {
    h.addEventListener('click', function() {
      this.closest('.card').classList.toggle('open');
    });
  });
  setTimeout(() => {
    if (observer) observer.disconnect();
    observeCards();
  }, 50);
}

let observer = null;
function observeCards() {
  observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  document.querySelectorAll('.card-wrap').forEach(el => {
    if (!el.classList.contains('visible')) observer.observe(el);
    else el.classList.add('visible');
  });
}

tabs.forEach(tab => {
  tab.addEventListener('click', function() {
    switchModule(this.dataset.module);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

window.addEventListener('scroll', function() {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  if (h > 0) progressFill.style.width = Math.min(100, (window.scrollY / h) * 100) + '%';
}, { passive: true });

switchModule('stocks');

// 支持 hash 导航（PWA shortcuts 和外部链接跳转）
function initFromHash() {
  var hash = window.location.hash.replace('#', '');
  if (hash && data[hash]) {
    switchModule(hash);
  }
}
window.addEventListener('hashchange', function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && data[hash]) switchModule(hash);
});
initFromHash();
</script>

  window.addEventListener('load', function() {

      console.log('SW registered:', reg.scope);
    }, function(err) {

    });
  });
}
</script>
