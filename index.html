:root{--bg:#f8f7f4;--card-bg:#fff;--text-primary:#1a1a2e;--text-secondary:#6b7280;--text-muted:#9ca3af;--gold:#c8a44a;--gold-light:#fef9ed;--gold-border:#e8d5a0;--border:#e5e7eb;--border-light:#f0f0f0;--green:#22c55e;--green-light:#dcfce7;--red:#ef4444;--red-light:#fee2e2;--shadow:0 1px 3px rgba(0,0,0,.04);--shadow-h:0 4px 12px rgba(0,0,0,.06);--radius:12px;--radius-sm:8px;--font-display:Georgia,"PingFang SC","Noto Serif CJK SC",serif;--font-body:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;--font-mono:"SF Mono","Menlo","Monaco",monospace;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
/* 字号缩放变量 */
:root{--scale:1;--fs-h1:24px;--fs-subtitle:12px;--fs-tab:13px;--fs-thread:15px;--fs-card-title:13.5px;--fs-card-body:12px;--fs-section:10px;--fs-badge:10px;--fs-count:10px;--fs-case-box:12px;--fs-practical:12px;--fs-diagram-cap:10px;--fs-footer:11px}
body.size-m{--fs-h1:26px;--fs-subtitle:13px;--fs-tab:14px;--fs-thread:16px;--fs-card-title:14.5px;--fs-card-body:13px;--fs-section:11px;--fs-badge:11px;--fs-count:11px;--fs-case-box:13px;--fs-practical:13px;--fs-diagram-cap:11px;--fs-footer:12px}
body.size-l{--fs-h1:28px;--fs-subtitle:14px;--fs-tab:15px;--fs-thread:17px;--fs-card-title:15.5px;--fs-card-body:14px;--fs-section:12px;--fs-badge:12px;--fs-count:12px;--fs-case-box:14px;--fs-practical:14px;--fs-diagram-cap:12px;--fs-footer:13px}
/* 深色模式 */
body.dark{--bg:#121418;--card-bg:#1c1e24;--text-primary:#e2e4e9;--text-secondary:#9ca3af;--text-muted:#6b7280;--gold:#d4a843;--gold-light:#252010;--gold-border:#3a3020;--border:#2e3038;--border-light:#262830;--shadow:0 1px 3px rgba(0,0,0,.3);--shadow-h:0 4px 12px rgba(0,0,0,.4);--green:#2dab5e;--red:#e5484d}
body.dark .icon.fundamental{background:#1e2040;color:#818cf8}
body.dark .icon.technical{background:#2a2515;color:#fbbf24}
body.dark .icon.integration{background:#14281a;color:#34d399}
body.dark .practical-box{background:#1a1f3a;color:#a5b4fc}
body.dark .ref-box{background:#1e1a30;color:#c4b5fd}
body.dark .combo-box{background:#0f2618;color:#6ee7b7}
body.dark .case-box{background:#1e1808;color:#d4a843}
body.dark .boundary-box{background:#1c1c20;color:#9ca3af}
body.dark .global-progress{background:#1c1e24}
body.dark .tabs{background:rgba(28,30,36,.92)}
body.dark .diagram-box{background:#16181c}
body.dark .diagram-box svg rect[fill="#fafaf8"]{fill:#16181c}
body.dark .diagram-box svg text[fill="#374151"]{fill:#d1d5db}
body.dark .diagram-box svg text[fill="#9ca3af"]{fill:#6b7280}
body.dark .diagram-box svg line{stroke:#333!important}
body.dark .header{background:#1c1e24;border-bottom-color:#262830}
body.dark .header::after{opacity:.3}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:calc(40px + var(--safe-bottom));overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.008) 2px,rgba(0,0,0,.008) 4px);pointer-events:none;z-index:0}

.header{position:relative;z-index:10;padding:calc(24px + var(--safe-top)) 20px 16px;background:var(--card-bg);border-bottom:1px solid var(--border-light)}
.header::after{content:'';position:absolute;bottom:-1px;left:20px;right:20px;height:3px;background:linear-gradient(90deg,var(--gold) 0%,transparent 100%);border-radius:2px;opacity:.6}
.header h1{font-family:var(--font-display);font-size:24px;font-weight:700;letter-spacing:1px;color:var(--text-primary);line-height:1.2;display:flex;align-items:baseline;gap:10px}
.header h1 span{color:var(--gold)}
.header .subtitle{font-size:12px;color:var(--text-secondary);margin-top:2px;letter-spacing:.2px}

/* 全局进度条 */
.global-progress{display:flex;align-items:center;gap:8px;margin-top:8px;padding:6px 10px;background:#f0f0f5;border-radius:8px;font-size:11px;color:var(--text-secondary)}
.global-progress .bar{flex:1;height:6px;background:#e0e0e5;border-radius:3px;overflow:hidden}
.global-progress .bar .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--green));border-radius:3px;transition:width .4s ease;width:0%}
.global-progress .pct{font-weight:600;font-family:var(--font-mono);min-width:32px;text-align:right;color:var(--text-primary)}

.progress-bar-fixed{position:fixed;top:0;left:0;right:0;height:3px;z-index:100;background:transparent}
.progress-bar-fixed .fill{height:100%;width:0%;background:linear-gradient(90deg,var(--gold),#dbb85a);transition:width 100ms ease;border-radius:0 2px 2px 0}

.tabs{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border-light);display:flex;padding:0 10px}
.tabs .tab{flex:1;text-align:center;padding:12px 6px 10px;font-size:13px;font-weight:500;color:var(--text-muted);border:none;background:none;cursor:pointer;position:relative;transition:color .2s;-webkit-tap-highlight-color:transparent;outline:none;font-family:var(--font-body)}
.tabs .tab::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%) scaleX(0);width:32%;height:2.5px;background:var(--text-primary);border-radius:2px;transition:transform .25s cubic-bezier(.22,1,.36,1)}
.tabs .tab.active{color:var(--text-primary);font-weight:600}
.tabs .tab.active::after{transform:translateX(-50%) scaleX(1)}
.tabs .tab:active{opacity:.7}

.content{position:relative;z-index:1;padding:10px 12px 40px;max-width:500px;margin:0 auto}
.module{display:none;animation:fadeSlideIn .35s ease}.module.active{display:block}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

.thread-header{display:flex;align-items:center;gap:8px;margin:18px 0 10px;padding:0 2px}
.thread-header:first-of-type{margin-top:0}
.thread-header .icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.thread-header .icon.fundamental{background:#eef2ff;color:#6366f1}
.thread-header .icon.technical{background:#fef3c7;color:#d97706}
.thread-header .icon.integration{background:#dcfce7;color:#16a34a}
.thread-header h2{font-family:var(--font-display);font-size:15px;font-weight:600;color:var(--text-primary);letter-spacing:.3px}
.thread-header .count{font-size:10px;color:var(--text-muted);font-family:var(--font-mono);margin-left:auto}
.thread-progress{font-size:10px;font-family:var(--font-mono);color:var(--text-muted);margin-left:6px;white-space:nowrap}
.thread-progress .done{color:var(--green);font-weight:600}

.card-wrap{margin-bottom:8px;opacity:0;transform:translateY(16px);transition:opacity .5s ease,transform .5s ease}
.card-wrap.visible{opacity:1;transform:translateY(0)}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .25s ease}
.card:active{box-shadow:var(--shadow-h)}
.card-header{display:flex;align-items:center;gap:8px;padding:10px 10px 10px 12px;cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;transition:background .2s}
.card-header:active{background:rgba(0,0,0,.02)}
.card-header .learn-toggle{width:18px;height:18px;border-radius:50%;border:2px solid #d1d5db;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;transition:all .25s ease;background:transparent}
.card-header .learn-toggle.learned{background:var(--green);border-color:var(--green);color:#fff}
.card-header .num{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);min-width:18px;font-weight:500}
.card-header .title{flex:1;font-size:13.5px;font-weight:500;color:var(--text-primary);line-height:1.3}
.card-header .title.learned{color:#9ca3af;text-decoration:line-through;text-decoration-color:var(--text-muted)}
.card-header .arrow{font-size:10px;color:var(--text-muted);transition:transform .3s cubic-bezier(.22,1,.36,1);flex-shrink:0;margin-left:2px}
.card.open .card-header .arrow{transform:rotate(180deg)}
.card-body{max-height:0;overflow:hidden;transition:max-height .45s cubic-bezier(.22,1,.36,1),padding .3s ease;padding:0 12px}
.card.open .card-body{max-height:3000px;padding:0 12px 12px}

.card-body .brief{font-size:12.5px;color:var(--text-secondary);line-height:1.6;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid var(--border-light)}
.card-body .section-label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin:8px 0 4px;display:flex;align-items:center;gap:5px}
.card-body .section-label::after{content:'';flex:1;height:1px;background:var(--border-light)}
.card-body .practical-box{font-size:12px;line-height:1.7;background:#f0f7ff;border-left:3px solid #6366f1;padding:6px 8px;border-radius:var(--radius-sm);margin-bottom:8px;color:#374151}
.card-body .ref-box{font-size:12px;line-height:1.7;background:#f5f3ff;border-left:3px solid #8b5cf6;padding:6px 8px;border-radius:var(--radius-sm);margin-bottom:8px;color:#374151}
.card-body .combo-box{font-size:12px;line-height:1.7;background:#f0fdf4;border-left:3px solid #22c55e;padding:6px 8px;border-radius:var(--radius-sm);margin-bottom:8px;color:#374151}
.card-body .tag-case,.card-body .tag-boundary{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;margin-bottom:5px;letter-spacing:.3px}
.card-body .tag-case{background:var(--gold-light);color:#8b6e2a;border:1px solid var(--gold-border)}
.card-body .tag-boundary{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.card-body .case-box,.card-body .boundary-box{font-size:12px;line-height:1.7;padding:6px 8px;border-radius:var(--radius-sm);margin-bottom:8px}
.card-body .case-box{background:var(--gold-light);border-left:3px solid var(--gold);color:#5a4a2a}
.card-body .boundary-box{background:#f9fafb;border-left:3px solid #d1d5db;color:#4b5563}
.card-body .case-box:last-child,.card-body .boundary-box:last-child{margin-bottom:0}
.card-body .diagram-box{background:#fafaf8;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px;margin-bottom:8px;text-align:center}
.card-body .diagram-box svg{max-width:100%;height:auto;display:block;margin:0 auto}
.card-body .diagram-caption{font-size:10px;color:var(--text-muted);margin-top:3px}

.footer{text-align:center;padding:20px 16px 28px;font-size:11px;color:var(--text-muted);line-height:1.6;max-width:500px;margin:0 auto;border-top:1px solid var(--border-light)}
.footer strong{color:var(--text-secondary);font-weight:500}

/* Empty state for module nav */
.module-nav{display:flex;gap:6px;margin-bottom:10px;padding:0 2px}
.module-nav .mn-btn{font-size:11px;padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:var(--card-bg);color:var(--text-secondary);cursor:pointer;transition:all .2s;font-family:var(--font-body);-webkit-tap-highlight-color:transparent}
.module-nav .mn-btn.active{background:var(--gold);color:#fff;border-color:var(--gold)}

@media(min-width:430px){
  .content{padding:14px 18px 48px}
  .header{padding:calc(28px + var(--safe-top)) 24px 20px}
  .header h1{font-size:28px}
  .card-header{padding:12px 12px 12px 16px}
  .card-body .brief{font-size:13px}
  .card.open .card-body{max-height:3500px;padding:0 16px 16px}
  .card-body .practical-box,.card-body .ref-box,.card-body .combo-box,.card-body .case-box,.card-body .boundary-box{font-size:12.5px}
}
.card-wrap{will-change:opacity,transform}
</style></head>
<body>

<div class="progress-bar-fixed"><div class="fill" id="progressFill"></div></div>

<header class="header">
  <h1>交易<span>知识</span>地图</h1>
  <p class="subtitle">基本面 × 技术分析 · 股票 / 债券 / 期货 · 实战交易指南</p>

    <span>📖 学习进度</span>
    <div class="bar"><div class="fill" id="globalProgressFill"></div></div>
    <span class="pct" id="globalPct">0%</span>
  </div>
  <div style="display:flex;gap:6px;margin-top:4px;align-items:center;flex-wrap:wrap;justify-content:space-between">
    <span></span>
    <span style="font-size:20px;cursor:pointer;opacity:.5;transition:opacity .2s" onclick="toggleSettings()" ontouchstart="" id="settingsBtn">⚙️</span>
  </div>
</header>

<!-- 设置面板 -->
<div id="settingsPanel" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)" onclick="closeSettings(event)">
  <div style="position:absolute;top:60px;left:16px;right:16px;max-width:468px;margin:0 auto;background:var(--card-bg);border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:20px;animation:slideDown .25s ease" onclick="event.stopPropagation()" id="settingsInner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border-light)">
      <span style="font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--text-primary)">设置</span>
      <span style="font-size:22px;cursor:pointer;opacity:.4" onclick="closeSettings()">✕</span>
    </div>

    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;letter-spacing:.3px">🔤 字体大小</div>
      <div style="display:flex;gap:8px">
        <span class="size-btn" data-size="s" onclick="setFontSize('s')" style="flex:1;text-align:center;padding:8px;border-radius:8px;border:2px solid var(--border);font-size:12px;cursor:pointer;color:var(--text-secondary);font-weight:500;transition:all .2s">小</span>
        <span class="size-btn active" data-size="m" onclick="setFontSize('m')" style="flex:1;text-align:center;padding:8px;border-radius:8px;border:2px solid var(--gold);font-size:14px;cursor:pointer;color:var(--gold);font-weight:600;transition:all .2s">中</span>
        <span class="size-btn" data-size="l" onclick="setFontSize('l')" style="flex:1;text-align:center;padding:8px;border-radius:8px;border:2px solid var(--border);font-size:16px;cursor:pointer;color:var(--text-secondary);font-weight:500;transition:all .2s">大</span>
      </div>
    </div>

    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;letter-spacing:.3px">🎨 主题模式</div>
      <div style="display:flex;gap:8px">
        <span class="theme-btn active" data-theme="light" onclick="setTheme('light')" style="flex:1;text-align:center;padding:8px 12px;border-radius:8px;border:2px solid var(--gold);cursor:pointer;font-size:13px;color:var(--gold);font-weight:600;transition:all .2s">☀️ 浅色</span>
        <span class="theme-btn" data-theme="dark" onclick="setTheme('dark')" style="flex:1;text-align:center;padding:8px 12px;border-radius:8px;border:2px solid var(--border);cursor:pointer;font-size:13px;color:var(--text-secondary);font-weight:500;transition:all .2s">🌙 深色</span>
      </div>
    </div>

    <div style="padding-top:12px;border-top:1px solid var(--border-light)">
      <div style="font-size:11px;color:var(--text-muted);cursor:pointer;text-align:center;padding:6px" onclick="clearCacheAndReload()">🗑️ 清除缓存并刷新</div>
    </div>
  </div>
</div>

<nav class="tabs" id="tabs">
  <button class="tab active" data-module="stocks">股票</button>
  <button class="tab" data-module="bonds">债券</button>
  <button class="tab" data-module="futures">期货</button>
  <button class="tab" data-module="integration">综合实战</button>
</nav>

<div class="content" id="content"></div>

<footer class="footer">

  市场有风险，交易需谨慎。过往表现不代表未来收益。
</footer>

D.kellyFormula=`<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">凯利公式 · 最优仓位计算</text><rect x="30" y="26" width="280" height="34" rx="5" fill="#1a1a2e"/><text x="170" y="48" font-size="14" font-weight="700" fill="#fff" text-anchor="middle">f = (bp - q) / b</text><text x="50" y="76" font-size="9" fill="#374151">f = 最优仓位比例 b = 盈亏比</text><text x="50" y="90" font-size="9" fill="#374151">p = 胜率 q = 1-p = 亏损概率</text><rect x="30" y="102" width="280" height="34" rx="5" fill="#f0f7ff" stroke="#6366f1" stroke-width="1"/><text x="50" y="118" font-size="8" fill="#4338ca">例：胜率55% · 盈亏比1.5</text><text x="50" y="132" font-size="8" fill="#4338ca">f=(1.5×0.55−0.45)/1.5=25% → 半凯利12.5%</text><text x="170" y="160" font-size="8" fill="#9ca3af" text-anchor="middle">⚠ 全凯利风险大，实战用半凯利或1/4凯利</text></svg>`;

// ==================== IndexedDB 学习进度持久化 ====================
const DB_NAME = 'TradeMapDB', DB_VER = 1, STORE = 'progress';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE)) {
        const store = db.createObjectStore(STORE, { keyPath: 'id' });
        store.createIndex('learned', 'learned', { unique: false });
        store.createIndex('timestamp', 'timestamp', { unique: false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

async function saveProgress(id, learned) {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readwrite');
    tx.objectStore(STORE).put({ id, learned, timestamp: Date.now() });
    await new Promise((resolve, reject) => {
      tx.oncomplete = resolve; tx.onerror = reject;
    });
    db.close();
  } catch(e) { console.warn('IDB save error:', e); }
}

async function loadAllProgress() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE, 'readonly');
    const store = tx.objectStore(STORE);
    const all = await new Promise((resolve, reject) => {
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = reject;
    });
    db.close();
    const map = {};
    (all || []).forEach(r => { map[r.id] = r.learned; });
    return map;
  } catch(e) { console.warn('IDB load error:', e); return {}; }
}

    technical:{ icon:'📈', label:'技术面分析', points:[
      {id:'s-t-1',title:'K线形态组合',brief:'通过K线实体、影线和位置关系洞察多空博弈情绪和潜在转折信号。',practical:'① 锤子线：下影线>实体2倍+次日阳线=买入。② 吞没形态：阳线完全覆盖前阴+放量=可靠反转。③ 十字星：趋势末端+缩量=趋势暂歇。④ 周线级别信号胜率比日线高3倍。',ref:'锤子线:影线/实体>2:1有效，>3:1强信号。周线胜率约65%，日线约55%。吞没需次日量>前日1.5倍确认。',combo:'K线+RSI背离：底部锤子线+RSI底背离=双重确认>70%胜率。K线+趋势线：关键趋势线+反转形态=极强。',
diagram: `<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><line x1="30" y1="35" x2="310" y2="35" stroke="#f0f0f0" stroke-width="1"/><line x1="30" y1="70" x2="310" y2="70" stroke="#f0f0f0" stroke-width="1"/><line x1="30" y1="105" x2="310" y2="105" stroke="#f0f0f0" stroke-width="1"/><line x1="30" y1="140" x2="310" y2="140" stroke="#f0f0f0" stroke-width="1"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">核心K线组合形态</text><line x1="60" y1="72" x2="60" y2="150" stroke="#dc2626" stroke-width="2"/><rect x="48" y="72" width="24" height="36" rx="2" fill="#dc2626" stroke="#dc2626" stroke-width="1.2"/><text x="60" y="165" font-size="7" fill="#9ca3af" text-anchor="middle">锤子线</text><rect x="115" y="85" width="14" height="35" rx="2" fill="#16a34a" stroke="#16a34a" stroke-width="1"/><rect x="110" y="65" width="34" height="18" rx="2" fill="#dc2626" stroke="#dc2626" stroke-width="1.2" opacity=".4"/><line x1="127" y1="55" x2="127" y2="65" stroke="#dc2626" stroke-width="1.2"/><line x1="127" y1="85" x2="127" y2="95" stroke="#16a34a" stroke-width="1"/><text x="132" y="165" font-size="7" fill="#9ca3af" text-anchor="middle">阳吞阴</text><rect x="185" y="76" width="4" height="4" rx="1" fill="#6b7280"/><line x1="187" y1="55" x2="187" y2="76" stroke="#6b7280" stroke-width="1.2"/><line x1="187" y1="80" x2="187" y2="105" stroke="#6b7280" stroke-width="1.2"/><text x="187" y="165" font-size="7" fill="#9ca3af" text-anchor="middle">十字星</text><polyline points="245,135 270,95 300,55" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="4,3"/><rect x="245" y="90" width="16" height="45" rx="2" fill="#dc2626" stroke="#dc2626" stroke-width="1.2" opacity=".4"/><rect x="270" y="55" width="16" height="40" rx="2" fill="#16a34a" stroke="#16a34a" stroke-width="1.2"/><rect x="300" y="22" width="16" height="35" rx="2" fill="#16a34a" stroke="#16a34a" stroke-width="1.2"/><text x="280" y="165" font-size="7" fill="#9ca3af" text-anchor="middle">上升三法</text></svg>`,
case:'2022年10月31日上证锤子线：低开2885后回升收于2893，下影线60点、实体8点，影线/实体=7.5倍。次日放量阳线确认，2个月从2885涨至3310。',boundary:'低流动性个股K线不可信。单根K线胜率约50%，需后续确认。涨跌停中形态失真。'},
      {id:'s-t-2',title:'支撑与阻力',brief:'价格反复触碰的水平区域——多空博弈的关键防线和顶底互换位。',practical:'① 确认有效性：触碰3次+成交量配合。② 突破确认：收盘站稳3%+放量30%=有效。③ 跌破的支撑变新阻力（顶底互换）。④ 整数关口是心理位。',ref:'有效判定：触碰3次+每次反弹/回落幅度递减。突破过滤：3%或3天规则。成交量确认：>20日均量30%。',combo:'支撑+布林下轨=强化。阻力+布林上轨=强化。支撑+MA60=黄金支撑组合。',
diagram: `<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">支撑与阻力 · 顶底互换</text><line x1="40" y1="42" x2="320" y2="42" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/><text x="325" y="45" font-size="8" fill="#dc2626">阻力 R</text><line x1="40" y1="135" x2="320" y2="135" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3"/><text x="325" y="138" font-size="8" fill="#16a34a">支撑 S</text><polyline points="50,105 80,65 110,85 140,52 170,75 200,42 220,58 240,42 260,95 280,130 310,135" fill="none" stroke="#374151" stroke-width="2"/><circle cx="80" cy="65" r="3.5" fill="#dc2626"/><circle cx="140" cy="52" r="3.5" fill="#dc2626"/><circle cx="200" cy="42" r="3.5" fill="#dc2626"/><circle cx="240" cy="42" r="3.5" fill="#dc2626"/><circle cx="110" cy="85" r="3.5" fill="#16a34a"/><circle cx="260" cy="95" r="3.5" fill="#16a34a"/><circle cx="310" cy="135" r="3.5" fill="#16a34a"/><text x="275" y="128" font-size="7" fill="#dc2626" text-anchor="middle">跌破</text></svg>`,
case:'上证3000点在2016-2023年被触碰15次——A股最强支撑位。每次接近3000都有护盘+抄底资金。2023年10月有效跌破后3000变阻力。',boundary:'强趋势中支撑/阻力可被轻松突破。支撑/阻力是"区"而非精确价格（±1%）。随时间推移而衰减。'},
      {id:'s-t-3',title:'移动平均线系统',brief:'计算平均价格平滑波动，识别趋势方向和金叉/死叉信号。',practical:'① MA20>MA60>MA250=多头排列，持有。② 多头中回调至MA20不破=加仓点。③ 金叉（MA20上穿MA60）+放量=买入。④ MA250（年线）之上为技术性牛市，之下为技术性熊市。',ref:'短线MA5/10、中线MA20/60、长线MA120/250。年线之上=牛市，之下=熊市。',combo:'均线+成交量=趋势强度。均线+MACD零轴上方=最强趋势环境。均线+布林中轨=双重支撑。',
diagram:`<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">均线系统 · 金叉死叉</text><polyline points="40,150 70,145 100,135 130,130 160,120 190,75 220,70 250,48 280,42 310,38" fill="none" stroke="#374151" stroke-width="2"/><polyline points="40,145 70,140 100,138 130,135 160,130 190,112 220,102 250,78 280,70 310,65" fill="none" stroke="#6366f1" stroke-width="1.2"/><text x="315" y="67" font-size="7" fill="#6366f1">MA10</text><polyline points="40,125 70,127 100,128 130,129 160,130 190,128 220,126 250,120 280,115 310,112" fill="none" stroke="#d97706" stroke-width="1.2"/><text x="315" y="114" font-size="7" fill="#d97706">MA60</text><circle cx="190" cy="128" r="10" fill="none" stroke="#16a34a" stroke-width="2"/><text x="190" y="131" font-size="8" font-weight="700" fill="#16a34a" text-anchor="middle">✓</text><text x="190" y="170" font-size="8" fill="#16a34a" text-anchor="middle" font-weight="600">金叉买入</text><circle cx="280" cy="78" r="10" fill="none" stroke="#dc2626" stroke-width="2"/><text x="280" y="81" font-size="8" font-weight="700" fill="#dc2626" text-anchor="middle">✗</text><text x="280" y="170" font-size="8" fill="#dc2626" text-anchor="middle" font-weight="600">死叉卖出</text></svg>`,
case:'2020年3月创业板MA20上穿MA60金叉→15个月涨至3576。2021年12月死叉→趋势反转。年线跌破后18个月在年线下方运行。',boundary:'震荡市均线频繁交叉，假信号率>60%。均线天然滞后——金叉确认时趋势已走一部分。'},
      {id:'s-t-4',title:'MACD 指标',brief:'通过快慢均线的聚合/分离判断动能——背离信号是趋势转折的可靠预警。',practical:'① 零轴上金叉=强买入（主升浪），零轴下金叉=弱反弹。② 顶背离（股价新高+MACD未新高）=上涨衰竭准备离场。③ 底背离（股价新低+MACD抬高）=下跌衰竭。',ref:'参数(12,26,9)标准，A股可调(6,13,5)缩短敏感度。背离+成交量萎缩=极高胜率。',combo:'MACD+RSI：双重背离+极端区=>75%胜率。MACD+均线：多头排列+零轴上金叉=最强共振。',
diagram:`<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">MACD 顶背离 · 价高指标低</text><polyline points="50,140 80,110 110,125 140,80 170,95 200,50 230,62 260,40 290,55" fill="none" stroke="#374151" stroke-width="2"/><text x="260" y="35" font-size="8" fill="#374151" font-weight="600">价格新高</text><circle cx="260" cy="40" r="4" fill="#374151"/><polyline points="50,162 80,147 110,152 140,132 170,137 200,118 230,123 260,128 290,133" fill="none" stroke="#6366f1" stroke-width="1.2" stroke-dasharray="4,3"/><text x="260" y="123" font-size="8" fill="#6366f1">MACD未新高</text><circle cx="260" cy="128" r="4" fill="#6366f1"/><line x1="200" y1="50" x2="260" y2="40" stroke="#dc2626" stroke-width="1.2"/><line x1="200" y1="118" x2="260" y2="128" stroke="#16a34a" stroke-width="1.2"/><text x="145" y="108" font-size="8" fill="#dc2626">顶背离 → 卖出</text></svg>`,
case:'2021年1月茅台2600新高+MACD顶背离+RSI从88回落，双重背离确认后两周跌至1900。2022年10月宁德时代底背离后从160反弹至230。',boundary:'背离可持续多次（"背离之后还有背离"）。强趋势中MACD长时间钝化。MACD是概率信号（60-70%胜率）。'},
      {id:'s-t-5',title:'RSI 相对强弱指标',brief:'衡量价格变动速度和幅度——判断超买超卖和背离信号。',practical:'① RSI>70不必然卖（牛市可延续），RSI<30不必然买（熊市可延续）。② RSI背离>>超买超卖更有价值。③ RSI突破趋势线（如从30以下突破）=买入信号。',ref:'参数14日标准，A股敏感用9日。超买/超卖：70/30(14日)，80/20(9日)。周线背离胜率>70%。',combo:'RSI+MACD双重背离=>75%胜率。RSI<30+布林下轨=强烈买入信号。',
diagram:`<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">RSI 超买超卖与背离</text><line x1="30" y1="38" x2="320" y2="38" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="6,4"/><text x="325" y="41" font-size="8" fill="#dc2626">70 超买</text><line x1="30" y1="135" x2="320" y2="135" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="6,4"/><text x="325" y="138" font-size="8" fill="#16a34a">30 超卖</text><line x1="30" y1="88" x2="320" y2="88" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,3"/><polyline points="40,122 70,105 100,112 130,75 160,85 190,48 220,33 250,50 280,42 310,65" fill="none" stroke="#6366f1" stroke-width="2"/><line x1="190" y1="48" x2="280" y2="42" stroke="#16a34a" stroke-width="1" stroke-dasharray="3,2"/><circle cx="190" cy="48" r="3.5" fill="#6366f1"/><circle cx="280" cy="42" r="3.5" fill="#6366f1"/><text x="235" y="28" font-size="7" fill="#16a34a">顶背离信号</text></svg>`,
case:'2021年12月比亚迪新高333+RSI顶背离(85→70)→跌至178(-46%)。2022年10月RSI跌至18(极度超卖)+MACD底背离=底部区域→反弹至300。',boundary:'强单边趋势中RSI可长期超买/超卖。RSI更适合震荡市+趋势末端。必须结合趋势判断。'},
      {id:'s-t-6',title:'布林带',brief:'以均线为中心、标准差为带宽的动态通道——度量和预测波动率。',practical:'① 带宽收窄（挤压）后有大行情——用其他工具判方向。② 价格触及上轨+RSI>70=短期过热。③ 开口扩张的方向=趋势方向。④ 中轨是MA20——价在其中轨上方=短期多头。',ref:'参数(20,2)。带宽<10%关注突破。上轨突破3天不回=有效。',combo:'布林+成交量：带宽收窄末期放量突破=可靠信号。布林+MACD：MACD零轴上+沿上轨走=强趋势。',
diagram:`<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">布林带 · 通道与突破</text><polyline points="40,35 100,42 160,28 220,32 280,24 300,28" fill="none" stroke="#dc2626" stroke-width="1" stroke-dasharray="4,3"/><text x="305" y="31" font-size="7" fill="#dc2626">上轨</text><polyline points="40,75 100,80 160,70 220,75 280,65 300,70" fill="none" stroke="#6366f1" stroke-width="1.2"/><text x="305" y="73" font-size="7" fill="#6366f1">中轨</text><polyline points="40,112 100,117 160,108 220,112 280,104 300,108" fill="none" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/><text x="305" y="111" font-size="7" fill="#16a34a">下轨</text><polyline points="50,60 80,65 110,45 140,75 170,70 200,95 230,60 260,28 290,55" fill="none" stroke="#374151" stroke-width="2"/><circle cx="260" cy="28" r="4" fill="#dc2626"/><text x="245" y="18" font-size="7" fill="#dc2626">触及轨</text><rect x="130" y="34" width="40" height="72" rx="2" fill="none" stroke="#d97706" stroke-width="1" stroke-dasharray="3,2"/><text x="150" y="122" font-size="7" fill="#d97706" text-anchor="middle">带宽收窄</text></svg>`,
case:'2023年8月上证布林带宽压缩至6%，随后开口向下扩张从3200跌至3050。纯碱期货带宽从25%压缩至10%后向上开口从1800涨至2600。',boundary:'强趋势中价格可长期沿上轨运行。参数(20,2)是经验值，不同品种需调整。极端行情价格可远脱离轨道。'},
      {id:'s-t-7',title:'成交量分析',brief:'成交量验证价格变动的真实性和可持续性——"量在价先"。',practical:'① 价涨量增=健康上涨。价涨量缩=反弹乏力。② 价跌量增=恐慌出逃（短期见底信号）。③ 底部放量止跌=见底第一条件。④ 缩量至<20日均量50%后放量=变盘前兆。',ref:'<20日均量50%=极度缩量，>20日均量50%+为放量，>2倍=巨量。换手率<1%冷清，1-3%正常，3-7%活跃。',combo:'成交量+K线形态=底部信号。成交量+突破=关键阻力需放量30%确认。',case:'2022年4月27日A股成交从6000亿放量至9000亿(+50%)，底部确认后涨至3424。2023年8月印花税利好从6000亿冲至1.1万亿但次日缩量，反弹不可持续。',boundary:'极端行情成交失真（涨跌停无量）。T+1制度含噪音。相对量（比20日均值）比绝对量更有意义。'},
      {id:'s-t-8',title:'量价背离',brief:'价格与成交量方向不一致——趋势可能无法持续的最可靠信号之一。',practical:'① 顶背离：价创新高+量递减→诱多，减仓。② 底背离：价创新低+量递增→有资金承接，准备入场。③ 背离维持越久(>1月)反转越确定。',ref:'判定标准：价>前高+量<前高对应量=顶背离。价<前低+量>前低对应量=底背离。周线>日线>60分钟。',combo:'量价背离+MACD背离同时出现=>80%胜率。量价背离+关键支撑/阻力=该位将被打破。',case:'2023年5月AIGC板块科大讯飞价创新高但成交从80亿缩至20亿，2周后跌超20%。2022年4月上证2863新低但成交递增形成底背离。',boundary:'高度控盘股无量上涨可持续。次新股的成交量不具可比性。关注相对量比绝对数重要。'},
      {id:'s-t-9',title:'趋势线与通道',brief:'连接价格低点或高点识别趋势方向和关键支撑/阻力。',practical:'① 连接至少3个抬升低点=上升趋势线。② 触碰3次+均匀间隔=有效。③ 被有效突破(>3%)=趋势可能逆转。④ 45度最佳，>60度过陡易反转。',ref:'3次触碰+均匀间隔。突破过滤>3%或3天。30-45度最可持续，>60度过陡，<20度横盘。',combo:'趋势线+MA60=双重支撑。趋势线+放量突破=信号可靠。',
case:'2022-2023年纳斯达克100在10000-16000形成上升通道，每次触下轨11000买入、触上轨15500卖出。2023年11月跌破通道趋势逆转。',boundary:'趋势线有一定主观性。极陡趋势线以"横盘突破"结束。大周期(周/月)比小周期(分钟/小时)可靠。盘整市中无效。'},
      // --- 新增9个技术面知识点 ---
      {id:'s-t-10',title:'头肩顶/底',brief:'最经典的反转形态——一个"头部"和两个"肩膀"形成的三峰结构，预示趋势逆转。',practical:'① 头肩顶：左肩→头(最高)→右肩+跌破颈线=看跌。② 头肩底：左肩→头(最低)→右肩+突破颈线=看涨。③ 最小目标=颈线到头的垂直距离。④ 突破颈线时需放量确认。',ref:'颈线突破时成交量至少>20日均量30%。右肩成交量<左肩（顶）/右肩量>左肩（底）。最小目标测量：头到颈线距离。',combo:'头肩顶+MACD顶背离=确认反转。头肩底+RSI底背离=强烈买入。',diagram:D.headShoulders,
case:'2021年2月上证3731形成周线头肩顶右肩（3723）+跌破颈线3400，最小目标3400-(3731-3400)=3069，此后跌至2863。上证50在2018年底形成头肩底后开启2年牛市。',boundary:'头肩形态在强趋势中可能失败（"空中加油"）。右肩形成期可能很长（数周至数月），过早入场会被回调消耗耐心。'},
      {id:'s-t-11',title:'M顶/W底（双顶双底）',brief:'价格两次冲击同一价位形成的反转形态——M顶看跌，W底看涨。',practical:'① M顶：两次冲顶失败+跌破颈线=卖出。② W底：两次探底回升+突破颈线=买入。③ 两次顶部/底部之间的距离越大，反转越可靠。④ 第二个峰成交量通常小于第一个（顶）/第二个谷量大于第一个（底）。',ref:'判定标准：两顶/底间距>2周更有效。颈线突破确认需>3%或3天。失败可能性：约30%。',combo:'M顶+RSI顶背离=极强卖出信号。W底+成交量递增=底部确认。',diagram:D.doubleTop,
case:'2021年12月-2022年1月上证形成M顶（3708和3700），颈线3580跌破后最低跌至2863，跌幅约700点（正好是顶到颈线距离×1.5）。2019年1月上证W底（2449和2440）后开启三年慢牛。',boundary:'M顶止损需放在第二个顶上方3%处。弱趋势中的"小双底"可靠性差。遇横盘整理形态则需警惕。'},
      {id:'s-t-12',title:'旗形与三角旗',brief:'趋势中的短暂整理形态——价格在通道中横向震荡后沿原方向突破。',practical:'① 旗形：急涨后的向下倾斜整理通道（看涨），急跌后的向上倾斜整理（看跌）。② 三角旗：急涨后的收缩三角形整理。③ 量缩整理→放量突破=入场信号。④ 目标涨幅≈旗杆高度。',ref:'旗杆长度×突破位=最小目标。整理期通常1-4周。>6周的旗形可靠性下降。成交量：整理期缩量>30%。',combo:'旗形+布林带收窄：带宽收窄到极致+放量突破=强信号。',diagram:D.flagPattern,
case:'2023年10月原油在72→97的上涨途中出现两次旗形整理（量缩+向下倾斜），每次放量突破后继续上行。"量缩整理+放量突破=加仓"的成功率约70%。',boundary:'旗形向下倾斜意味着空头在抵抗，突破可能失败。旗形跌破下轨则趋势逆转，需立即止损。'},
      {id:'s-t-13',title:'斐波那契回调',brief:'使用黄金分割比例（0.382/0.5/0.618）识别趋势中的关键回调位置和反弹压力。',practical:'① 上升趋势中：从低点画到高点→0.382/0.5/0.618是潜在回调支撑。② 0.618（61.8%）是最重要回撤位——回调不破则趋势完好。③ 回调到0.618+止跌K线=买入信号。④ 跌破0.618则趋势可能逆转。',ref:'关键比例：0.382(弱回调)、0.500(中回调)、0.618(强回调)、0.786(极深)。突破0.618后的延伸目标：1.272/1.618。',combo:'斐波那契+趋势线：0.618与趋势线重合=黄金支撑。斐波那契+布林下轨：双重支撑区域。',diagram:D.fibonacci,
case:'2023年螺纹钢从3300涨至3900，回调至3900-(3900-3300)×0.618=3530处获得支撑，随后再次上涨至4100。上证2022年2863-3424上涨段的0.618回调位=2863+(3424-2863)×0.382=3077，2022年10月最低3076。',boundary:'斐波那契在强单边趋势中可能全部被突破。当市场情绪极度乐观/悲观时，回撤可远超0.618（甚至0.786）。回调线起止点的选择有主观性。'},
      {id:'s-t-14',title:'缺口分析',brief:'价格跳空形成的真空区——不同位置的缺口反映不同的市场情绪。',practical:'① 突破缺口（底部放量+突破阻力）：趋势开启信号。② 持续缺口（趋势中途）：趋势中继，不回补则趋势强。③ 衰竭缺口（趋势末端+缩量）：趋势即将结束。④ "缺口必补"是A股规律——但时间不确定。',ref:'突破缺口：放量>前日均量50%+突破重要阻力=有效。持续缺口：连续出现2-3个=趋势末端。衰竭缺口：缺口后3日内反向运动=确认。',combo:'缺口+成交量：突破缺口+巨量=趋势确立。缺口+形态：突破缺口配合头肩底突破颈线。',
diagram:D.gapAnalysis,

      {id:'s-t-15',title:'OBV 能量潮',brief:'将成交量与价格方向结合的累积指标——"量先于价"的量化体现。',practical:'① OBV创新高而价格未新高=领先看涨信号（资金提前布局）。② OBV未创新高而价格创新高=顶背离（主力在出货）。③ OBV与价格同步上升=趋势健康。④ OBV创历史新高后价格通常跟进。',ref:'OBV新高对应价格通常滞后1-4周跟进。OBV顶背离=主力派发的最早信号。OBV支持位=价格的关键支撑。',combo:'OBV+趋势线：OBV突破其自身趋势线=价格将跟进的领先信号。OBV+成交量：OBV同步增量=趋势有量支撑。',case:'2022年11月上证2863后OBV率先突破下降趋势线，价格在1周后才跟进——OBV的领先性验证了底部。2023年5月AIGC板块价格新高但OBV未新高，2周后板块大跌20%。',boundary:'OBV对高价股和低价股的白然刻度不同（高价股成交额大但OBV只计方向）。极端行情中OBV可能失真。'},
      {id:'s-t-16',title:'KDJ 随机指标',brief:'通过计算一定周期内的最高价与最低价位置，判断短期超买超卖和买卖时机。',practical:'① K值>80超买，<20超卖。② K线上穿D线=金叉（买入），下穿=死叉（卖出）。③ 股价在高位/低位时KDJ的背离更有价值。④ KDJ周线金叉用于中期趋势，日线金叉用于短期。',ref:'参数(9,3,3)标准。K>80且D>75=超买区。金叉位置<30为低位金叉（强信号），>70为高位（弱）。',combo:'KDJ+MACD：KDJ金叉+MACD零轴上方金叉=最强买入组合。KDJ+R SI：同时<20=双重超卖。',
diagram:D.kdj,
case:'2022年10月上证KDJ周线在超卖区(10,8)形成低位金叉，此后反弹至3310。2023年6月KDJ高位死叉(K85下穿D80)+MACD顶背离，卖出信号叠加，此后跌至3050。',boundary:'KDJ在单边趋势中频繁钝化——牛市持续高位、熊市持续低位。KDJ更适合震荡市。周线比日线可靠。'},
      {id:'s-t-17',title:'ADX 趋向指标',brief:'衡量趋势强度（方向性）的指标——不告诉方向，但告诉趋势有多强。',practical:'① ADX<20=无趋势（震荡市），不适合趋势策略。② ADX>25=趋势形成，适合顺势交易。③ ADX>40=强趋势（可能出现趋势加速或末端加速）。④ +DI上穿-DI=上升趋势，下穿=下降趋势。',ref:'<20无趋势，>25趋势形成，>40强趋势，>50极强趋势（注意反转）。+DI与-DI交叉+ADX>25=最佳入场时机。',combo:'ADX+均线：ADX>25确认趋势+均线多头=持有。ADX+布林带：ADX从<20升至>25+布林带宽扩张=突破确认。',
diagram:D.adxChart,

      {id:'s-t-18',title:'一目均衡表',brief:'包含支撑阻力、趋势方向、买卖信号的综合性日本技术分析系统。',practical:'① 价格在云层（Kumo）上方=上升趋势，下方=下降趋势。② 转折线（9日高+低均值）上穿基准线（26日高+低均值）=买入。③ 云层从薄转厚=支撑/阻力增强。④ 价格突破云层=趋势确立。',ref:'转折线<基准线=弱势，>基准线=强势。云层厚度=未来支撑/阻力强度。先行线A>先行线B=云层上升（偏多）。',combo:'一目均衡+均线：价格在云层上方+MA多头排列=多重确认。一目均衡+MACD：云层上方+零轴上MACD金叉。',case:'2023年3月人民币汇率（美元兑人民币）先行线A上穿先行线B形成红色云层（看涨美元），价格在云层上方运行4个月，从6.8升至7.3。',boundary:'一目均衡表参数(9,26,52)对A股的适用性需微调。云层有天然的滞后性（26日移动）。学习和使用曲线较高。'},
    ]}

diagram:`<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">信用利差 · 风险偏好温度计</text><polyline points="50,92 100,97 150,92 200,87 250,92 300,90" fill="none" stroke="#6366f1" stroke-width="1.2"/><text x="305" y="93" font-size="7" fill="#6366f1">国债</text><polyline points="50,46 100,50 150,55 200,36 250,65 300,50" fill="none" stroke="#dc2626" stroke-width="2"/><text x="305" y="52" font-size="7" fill="#dc2626">信用债</text><path d="M50,46 Q100,50 150,55 Q200,36 250,65 L300,50 L300,90 Q250,92 200,87 Q150,92 100,97 L50,92 Z" fill="rgba(200,164,74,.08)"/><rect x="185" y="28" width="36" height="14" rx="3" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/><text x="203" y="38" font-size="7" font-weight="600" fill="#dc2626" text-anchor="middle">危机</text><line x1="140" y1="50" x2="140" y2="94" stroke="#d97706" stroke-width="1.2" stroke-dasharray="3,2"/><text x="130" y="76" font-size="8" fill="#d97706" text-anchor="end">利差</text></svg>`,
case:'2022年11月中国地产债信用利差从200bp扩大至2000bp+，碧桂园美元债跌至10美分以下。2023Q2政策刺激利差回落至500bp。',boundary:'中国刚兑在打破过程中，历史数据参考性有限。极端利差时流动性可能枯竭（有价无市）。'},
      {id:'b-f-6',title:'通胀与 TIPS',brief:'通胀侵蚀固定收益购买力。TIPS随CPI调整本金——对冲通胀的最佳工具。',practical:'① TIPS本金随CPI调整，票息按调整后本金支付。② 盈亏平衡通胀率=普通国债-TIPS收益率，衡量通胀预期。③ >3%通胀预期过高→买TIPS对冲；<2%通胀温和。',ref:'盈亏平衡通胀率正常2-2.5%。中国无TIPS，可用黄金替代通胀对冲。',combo:'TIPS+黄金：通胀环境均受益。TIPS+大宗商品：通胀初期商品先涨TIPS后涨。',case:'2022年CPI飙至9.1%，普通国债实际收益-7%，TIPS则涨12%。2023年通胀回落至3%，盈亏平衡从3%降至2.2%。',boundary:'TIPS在通缩时表现差（虽本金保底但票息降）。CPI与实际消费体验可能偏差。流动性低于普通国债。'},
      {id:'b-f-7',title:'债券分类',brief:'利率债(无信用风险)vs信用债(含信用风险)vs可转债(债+股期权)——风险收益差异极大。',practical:'① 利率债(国债/政金)：博利率方向。② 信用债(公司债/中票)：博信用利差，需研究个券。③ 可转债：兼具保底(纯债价值)和上涨弹性(转股溢价)。',ref:'风险排序：利率债<高等级信用债<可转债<高收益信用债。转股溢价率<20%=偏股，>50%=偏债。',combo:'可转债+股票：低位买可转债替代股票配置，风险收益比更优。利率+信用：利率下+利差收窄=双利好。',case:'2022年各类债券表现天差地别：国债-2%，高收益信用债暴跌，可转债跌超15%。三种债券本质是三种不同资产。',boundary:'分类在模糊化——部分地方债有信用分化。可转债本质是"有保底的股票"。混合融资工具的债/股性认定不同。'},
      {id:'b-f-8',title:'央行资产负债表',brief:'央行扩表(QE)/缩表(QT)是债市的"潮汐引擎"——直接影响债券供需和利率水平。',practical:'① 美联储缩表每月950亿(国债+MBS)，相当于减少债券需求。② 中国央行通过MLF/降准操作，观察超额还是缩量续作。③ QE结束到缩表开始之间是债市"甜蜜窗口"。',ref:'美联储表规模从1万亿(2008)到9万亿(2022)。QE1万亿约压降长端利率15-25bp。',combo:'扩表+收益率曲线：QE买长债→压降长端→曲线平坦。缩表+信用利差：缩表时信用利差通常走阔。',case:'2022年6月美联储开始缩表，10Y美债从1.5%飙至4.5%。中国2023年降准+MLF超续，10Y中债从2.9%降至2.6%。',boundary:'QE传导非完全线性。中国央行价格型工具与美联储不同。欧/日央行QE边际效用递减。'},
      {id:'b-f-9',title:'回购市场',brief:'回购利率(DR007)是资金面"体温计"——异常飙升预兆债市风险。',practical:'① DR007偏离政策利率>30bp=资金趋紧。② R007-DR007差值>50bp=非银融资困难(信用分层)。③ 季末/年末回购走高属季节性正常。',ref:'7天逆回购利率1.8%，MLF 2.5%。DR007正常1.6-2.0%。R007>3%紧张，>5%钱荒。',combo:'回购利率+利差：R007飙升+信用利差走阔=流动性危机模式。回购+股市：R007飙升利空股市。',case:'2013年"钱荒"隔夜回购30%，10Y国债从3.4%飙至4.6%。2022年11月理财赎回潮R007从1.5%飙至3.0%，信用债抛售无人接盘。',boundary:'季末/年末回购走高属正常。交易所回购与银行间机制不同。月度缴税期自然走高。'}
    ]},
    technical:{ icon:'📉', label:'技术面分析', points:[
      {id:'b-t-1',title:'价格利率反向关系',brief:'债券价格与市场利率反向变动——利率上行→债券价格下跌。',practical:'① 10Y美债收益率4%→4.5%，TLT跌约9%(久期18×0.5%)。② 国债期货技术分析与股票一致，只是逻辑反向。③ 关注收益率的技术位比价格整数位更有意义。',ref:'收益率每变动1bp，10年国债价格约变0.08%。关键整数位4.0%/4.5%/5.0%是心理关口。',combo:'反向关系+收益率曲线：短端和长端的变动往往不同步。利率技术形态(双顶/头肩)比价格形态更清晰。',case:'2023年10月10Y美债收益率从4.0%冲至5.0%，价格从98跌至92。收益率5.0%形成双顶后回落至4.0%，价格反弹至97。',boundary:'负利率中关系变形。超短债(1年内)对利率几乎不敏感。可转债更多受正股驱动。'},
      {id:'b-t-2',title:'收益率曲线交易',brief:'利用不同期限收益率的相对变化交易，对冲掉大部分利率方向风险。',practical:'① 陡峭化(买短+卖长)=押注利差扩大。② 平坦化(卖短+买长)=押注利差收窄。③ 在曲线极端形态后执行（均值回归）。',ref:'利差历史分位：<5%=极度平坦，>95%=极度陡峭。中国2s10s历史均值60-80bp。',combo:'曲线+通胀预期：通胀↑→曲线陡峭。曲线+央行指引：暂停加息=曲线可能陡峭。',case:'2023年3月硅谷银行后2Y收益率从5%暴跌至3.8%，10Y从4%降至3.4%，2s10s利差从-100bp收窄至-50bp，平坦化交易获利。',boundary:'中国仅3个品种曲线策略精细度有限。做空债需融券或期货。利差可长时间偏离均值。'},
      {id:'b-t-3',title:'国债期货技术分析',brief:'将股票技术分析方法应用于国债期货——技术形态同样有效。',practical:'① T(10年国债期货)是核心品种，流动性好。② 趋势线/均线/MACD全部适用。③ 持仓量变化确认趋势：增仓涨=债牛确立；减仓涨=空头回补。',ref:'T主力价格100-103元，保证金约3-4万元。成交量日均5-10万手。持仓>10万手=活跃。',combo:'国债期货+股票=跷跷板(经济好=股涨债跌)。国债期货+商品：商品涨(通胀)→债券跌。国债期货+外汇：人币贬→外资卖中债→债跌。',case:'2023年T从101.5涨至102.2量仓齐升，102.2双顶+持仓下降+MACD顶背离，三重确认后跌至101.0。',boundary:'成交量远小于股指期货，技术形态可能"滑点"。交割月基差收敛会扭曲图形。'},
      {id:'b-t-4',title:'信用利差走势',brief:'信用利差的趋势性变化先于经济周期2-3个月——重要的领先指标。',practical:'① 利差趋势走阔(>200bp)+加速=信用风险上升，减仓。② 利差趋势收窄+量放大=信用改善，增配。③ 走阔中成交锐减=流动性枯竭(最危险)。',ref:'AAA企业债与国债利差正常50-100bp。月累计走阔>20bp且趋势确认=信号。对经济领先约2-3个月。',combo:'利差+PMI新订单：PMI回升→盈利改善→利差收窄。利差+高频经济数据(高炉开工率/耗煤量)。',case:'2021年12月高收益债利差从300bp趋势性走阔至2022年11月2000bp+，地产大面积违约。2023Q1利差回落至500bp，地产债反弹。',boundary:'个券利差受流动性溢价影响。中国刚兑打破时间短，数据样本不足。极端高位可能"有价无市"。'},
      {id:'b-t-5',title:'债券ETF趋势',brief:'债券ETF提供像交易股票一样交易债券的方式，图形反映债市趋势。',practical:'① TLT(20年+国债ETF)是判断长端利率的最佳代理。② TLT的RSI<30=长债极度超卖，是买入机会。③ TLT布林带宽<5%=变盘信号。',ref:'TLT久期~18年，费用率0.15%，日均成交>100亿美元。HYG(高收益债ETF)费用率0.49%。',combo:'TLT+QQQ(纳指)：加息中同跌，降息中同涨。TLT+黄金：都在降息预期中涨。',case:'2023年10月TLT跌至82美元，RSI<30+月线级别底部放量。随后3个月反弹至100(+22%)，远超纳指同期的8%。',boundary:'ETF价格相对净值有折溢价。中国债券ETF市场规模小。跟踪久期误差影响技术精度。'},
      {id:'b-t-6',title:'MOVE波动率指数',brief:'债市"恐慌指数"——国债期权隐含波动率，反映债市恐惧和贪婪。',practical:'① MOVE<80=极度平静(可能是风暴前的宁静)。② MOVE>120=债市恐慌。③ MOVE从顶部回落时重启债券多头。',ref:'历史均值90-100。<70=极低波动，>150=恐慌(2008/2020)，>200=极度恐慌(2020年3月)。',combo:'MOVE+VIX：同升=全面恐慌，此时股债同跌（流动性危机）。MOVE↓+信用利差↓=债市最佳环境。',case:'2023年3月硅谷银行MOVE从90飙至198，10Y美债一周波动70bp。2023年11月MOVE回落至100以下，美债企稳。',boundary:'仅覆盖美国国债。中国无直接对应指标。低MOVE不代表债市必然反转。'},
      {id:'b-t-7',title:'流动性分析',brief:'债券的流动性可以在短时间内从充足变为枯竭——比利率风险更致命。',practical:'① 买卖价差：国债1-5bp正常，信用债10-50bp，>100bp=流动性枯竭。② 报价深度<5000万=流动性差。③ 流动性在危机中恶化速度极快。',ref:'国债价差1-5bp，AAA 5-20bp，AA 20-100bp。国债月换手率>50%，信用债<20%。',combo:'流动性+信用利差：流动性风险在利差走阔后期爆发。流动性+回购利率：回购飙→流动性紧→价差扩→最危险负反馈。',case:'2022年11月理财赎回潮：信用债买卖价差从10bp扩至100bp+，基金折价5%卖AAA信用债。不是利率或信用问题——纯粹是流动性危机。',boundary:'流动性是动态的——国债也可能在数据公布前突然变差。价格技术形态在流动性差时不可靠。'},
      {id:'b-t-8',title:'期限结构交易',brief:'押注收益率曲线特定段形状变化从利率相对变动中获利（方向中性）。',practical:'① 陡峭化：做多2Y+做空10Y(买TS+卖T)。② 平坦化：做空2Y+做多10Y(卖TS+买T)。③ 比例按DV01对冲（利率变动1bp时头寸盈亏相等）。',ref:'DV01对冲：T:TF≈1:2，T:TS≈1:4。利差极值参考历史5%和95%分位。',combo:'期限结构+货币政策预期：加息末期曲线通常平坦→陡峭化。期限+经济数据：数据超预期→曲线可能陡峭。',case:'2023年美联储暂停加息后2Y和10Y同降但10Y降更快，2s10s从-100bp收窄至-30bp，做多10Y+做空2Y的平坦化交易获利。',boundary:'中国做空债券工具不足(TS期货流动性弱)。境外做空长债的Carry成本可能侵蚀收益。'},
      // --- 新增8个债券技术面知识点 ---
      {id:'b-t-9',title:'债券K线形态',brief:'K线形态在债券期货和ETF上同样有效——关键颈线位和反转信号。',practical:'① 国债期货的"锤子线"在利率快速上升的末端出现=利率见顶信号。② 吞没形态在债券ETF中比个券更可靠（流动性好的原因）。③ 周线级别的十字星在T合约上有效。',ref:'胜率：周线约65%，日线约55%。关键位置：收益率整数位(4%/5%)附近+K线形态=高胜率信号。',combo:'K线+RSI超买超卖：国债期货锤子线+RSI<30=利率见顶。K线+MACD背离：长债ETF的日线底背离+K线反转形态。',case:'2023年10月TLT在82美元附近连续3日出现早晨之星（锤子线+十字星+阳线）+RSI 28,确认利率顶部，此后反弹至100。',boundary:'流动性差的品种K线不可信。交割月前基差收敛会扭曲K线形态。ETF需考虑净值折溢价。'},
      {id:'b-t-10',title:'债券RSI与超买超卖',brief:'RSI在债券市场同样有效——极值位置是利率趋势可能转变的信号。',practical:'① 债券价格RSI<30=长期超卖(利率可能见顶)，>70=超买(利率可能见底)。② 国债期货RSI背离比超买超卖本身更有价值。③ 高收益债ETF的RSI极值对信用环境敏感。',ref:'TLT的RSI(14)参数：<30为高度超卖（历史胜率>65%）。周线RSI背的置信度高于日线。',combo:'RSI+收益率曲线：2s10s利差极值+RSI背离=利率趋势可能逆转。',case:'2023年10月TLT的RSI周线<30+月线底背离=利率见顶的强烈信号，此后TLT从82涨至100(+22%)。',boundary:'强趋势中RSI可长期超买/超卖。利率上升周期中债券价格RSI可长期<30。'},
      {id:'b-t-11',title:'债券MACD与背离',brief:'MACD在国债期货和债券ETF上的背离信号同样可靠——利率趋势转折的预警。',practical:'① 债券价格底背离（价新低+MACD未新低）=利率见顶，买入。② 债券价格顶背离（价新高+MACD未新高）=利率见底，卖出。③ T合约的MACD周线背离最有价值。',ref:'MACD参数(12,26,9)标准。周线MACD背离+价格在关键收益率位=高胜率。',combo:'MACD+K线形态：MACD背离+周线锤子线=双重确认。MACD+持仓量：MACD背离+持仓开始增加=趋势可能反转。',case:'2023年10月TLT在82美元形成MACD周线底背离（股价新低但MACD抬高），此后反弹至100。2021年TLT在168美元形成周MACD顶背离，此后跌至82。',boundary:'背离可多次出现。强趋势中MACD可能长时间钝化。周线级别比日线可靠。'},
      {id:'b-t-12',title:'债券布林带',brief:'布林带在债券市场的应用关键在于带宽收窄=利率变盘信号。',practical:'① 债券价格布林带宽收窄至极值=利率即将有大变动。② 价格触及下轨（债券超卖）+RSI<30=利率见顶信号。③ 布林开口向上=债券价格上涨趋势确认。',ref:'TLT布林(20,2)标准。带宽<5%为极度收窄（历史变盘前信号）。中轨=20日均线是短期趋势线。',combo:'布林+收益率曲线：曲线倒挂+TLT布林下轨+带宽极窄=利率可能见顶。',case:'2023年10月TLT布林带宽收窄至3.8%(历史最低)，次日开口向上扩张，TLT从82涨至100，涨幅22%。布林"挤压"后的突破幅度可观。',boundary:'强趋势中价格可沿布林轨道运行。参数(20,2)需根据品种节奏调整。'},
      {id:'b-t-13',title:'跨市场联动：股债商',brief:'股票、债券、商品的跨市场关系提供了多重验证——不同阶段的联动模式不同。',practical:'① 经济衰退:股跌+债涨(避险)+商品跌——做多国债。② 经济复苏:股涨+债跌(风险偏好)+商品涨——做多股票做空国债。③ 滞胀:股跌+债跌+商品涨——持现金/商品。④ 关注"股债同跌"=流动性危机模式。',ref:'美林时钟+跨市场验证：通过股票/债券/商品三个市场的方向同时确认经济周期位置。股债同跌通常伴随流动性危机。',combo:'跨市场+技术图形：股债商的技术面同步出现反转信号=极高胜率。股债同向=极端行情。',
diagram:D.crossMarket,
case:'2022年股债商同跌(加息冲击)，出现罕见的"三杀"——股-18%、债-13%、商品-10%。2023年Q4预期降息后股债同涨。跨市场联动从"同向"转为"反向"本身就是重要信号。',boundary:'跨市场关系在不同宏观环境下可能突变（如2015年A股大跌但债也没大涨）。央行干预可能打破联动关系。'},

      {id:'f-t-2',title:'ATR 波动率止损',brief:'使用ATR设置动态止损——让止损与市场"同频呼吸"，避免被噪音扫出。',practical:'① 止损=入场价±2×ATR(14)。② 仓位=风险金÷(ATR×合约乘数)。③ ATR缩小=波动率下降→警惕"蓄力突破"。',ref:'ATR(14)参考：原油1.5-3美元、螺纹30-60元、黄金15-30美元。2×ATR止损80%不触及。',combo:'ATR+布林带：ATR与带宽高度相关→ATR下降+带宽收窄=变盘前兆。ATR+仓位：低波动品种可开大仓。',case:'豆油ATR在100点，2×ATR=200点止损。固定100点止损会被频繁扫出。ATR让止损与市场节奏一致，减少噪音干扰。',boundary:'低波动后通常跟高波动(波动率聚集效应)。ATR不指示方向。极端行情单日波动可超10倍ATR。'},

diagram:`<svg viewBox="0 0 340 175" xmlns="http://www.w3.org/2000/svg"><rect width="340" height="175" fill="#fafaf8" rx="6"/><text x="20" y="16" font-size="9" font-weight="600" fill="#374151">持仓量与价格 · 四种关系</text><polyline points="50,70 90,46" stroke="#16a34a" stroke-width="2" fill="none"/><circle cx="90" cy="46" r="3.5" fill="#16a34a"/><text x="70" y="42" font-size="8" fill="#16a34a" text-anchor="middle">仓↑+价↑=健康</text><polyline points="170,70 210,46" stroke="#d97706" stroke-width="2" fill="none"/><circle cx="210" cy="46" r="3.5" fill="#d97706"/><text x="190" y="42" font-size="8" fill="#d97706" text-anchor="middle">仓↓+价↑=虚涨</text><polyline points="50,128 90,152" stroke="#dc2626" stroke-width="2" fill="none"/><circle cx="90" cy="152" r="3.5" fill="#dc2626"/><text x="70" y="168" font-size="8" fill="#dc2626" text-anchor="middle">仓↑+价↓=趋势确立</text><polyline points="170,128 210,152" stroke="#6366f1" stroke-width="2" fill="none"/><circle cx="210" cy="152" r="3.5" fill="#6366f1"/><text x="190" y="168" font-size="8" fill="#6366f1" text-anchor="middle">仓↓+价↓=跌势尾声</text></svg>`,
case:'2023Q1铁矿从700涨至900,持仓从100万增至150万(增仓上行→趋势健康)。5月从900涨至920,持仓从150万降至110万(减仓涨→虚涨)→暴跌至700。',boundary:'日内平仓手续费优惠致日交易占比高。移仓换月时数据失真。涨跌停时持仓冻结。'},
      {id:'f-t-4',title:'跨期套利',brief:'同一品种不同月份合约的价差波动交易——方向基本中性，收益来自统计回归。',practical:'① 价差在历史极端(90%分位以上)时做反向。② 买近卖远(做多价差)=预期现货紧。③ 卖近买远(做空价差)=预期供应宽松。④ 风险比单边小60-70%。',ref:'保证金约30-50%（优惠）。统计回归周期2-8周。价差在历史2个标准差之外=极端机会。',combo:'跨期+基差：基差走强→价差也走强。跨期+库存：库存变化是价差核心驱动。',case:'豆粕1-5价差每年11-12月走强，2022年从200涨至550(+175%保证金收益)。2023年6月玉米价差高位做空(卖9买1)获利。',boundary:'非主力合约流动性不足。极端行情中价差不回归。做空近月可能遇逼仓。'},
      {id:'f-t-5',title:'突破交易法',brief:'价格突破关键支撑/阻力时顺势入场——"横有多长，竖有多高"。',practical:'① 平台突破最可靠：横盘越久突破行情越大。② 需量+仓配合：放量30%+增仓10%=真突破。③ 假突破过滤：3天或3%守住=有效。④ 最小目标=平台高度。',ref:'平台高=突破后最小目标。假突破约50%。真突破确认：量+20日均量30%+仓+10%+3天。',combo:'突破+布林：布林挤压后开口扩张+突破=极强。突破+MACD：突破平台+零轴上金叉=加速。',case:'2023年7月纯碱在1600-1800横盘2月，放量+50%增仓+20%突破1800→涨至2600。"横有多长竖有多高"——2月横盘=800点涨幅。',boundary:'震荡市突破胜率<30%。假突破>50%。算法交易下"突破陷阱"增多。止损设突破位下1ATR。'},
      {id:'f-t-6',title:'凯利公式仓位管理',brief:'量化最优下注比例——核心不是赚多少而是活得久。',practical:'① f=(bp-q)/b。胜率p、盈亏比b。② 半凯利(f/2)稳健，1/4凯利保守。③ 永不超凯利值。④ 总回撤>20%时减半仓位。',ref:'趋势跟踪(35%胜率+3.5盈亏比)=f=16%，半凯利=8%。日内短线(55%+1.2)=17.5%。',combo:'凯利+ATR：先用凯利算出策略资金比例，再用ATR算手数。凯利+多品种：相关性高的不能简单相加。',diagram:D.kellyFormula,
case:'策略胜率55%+盈亏比1.5:凯利25%。满仓(100%)→5次连续亏损=95%本金消失。半凯利12.5%→同期保留50%本金。',boundary:'胜率和盈亏比实际中动态变化。20%仓位在连续亏损时也会难受。相关性高的多品种不适用。'},
      {id:'f-t-7',title:'多周期分析',brief:'大周期定方向(周线)，小周期定执行(小时线)——共振>单一周期。',practical:'① 周线定趋势→日线定节奏→小时线定入场。② 只做与大周期同向的交易。③ 大周期震荡时减少交易。④ 三周期矛盾时不做。',ref:'胜率：多周期同向约65%，单周期约50%。大周期一个信号≈小周期5-10个信号。',combo:'多周期+趋势线：大周期趋势线支撑+小周期反转形态=最佳入场。多周期+MACD。',case:'2023Q4螺纹周线跌+日线弹至阻力(3900)+小时线顶背离→三周期共振做空，一周跌至3700。',boundary:'多周期常矛盾→最好不做。不同品种"节奏"不同。最终仍需主观决策。'},
      {id:'f-t-8',title:'波动率交易',brief:'利用期权隐含波动率(IV)与历史波动率(HV)偏差交易——赚波动率的钱而非方向的钱。',practical:'① IV>HV+溢价>20%=做空波动率(卖出宽跨式)。② IV<HV+折价>20%=做多波动率(买入期权)。③ 做空波动率核心风险是"尾部事件"。',ref:'沪深300期权IV正常15-25%。原油IV正常25-40%。IV百分比>80%=卖波动率窗口。<20%=买波动率窗口。',combo:'波动率+趋势跟踪：趋势明确时波动率走高→做多波动+趋势方向。波动+COT：COT拥挤+IV高=反转概率大。',case:'2023年3月硅谷银行原油IV从25%飙至65%。IV=60%卖宽跨式，2周后IV回落至35%——不赌油价方向，只赚IV回归的钱。',boundary:'裸卖期权风险无限。IV可长期高于HV。中国商品期权市场深度有限。需不断Delta对冲。'},
      // --- 新增8个期货技术面知识点 ---
      {id:'f-t-9',title:'期货K线形态',brief:'期货K线形态的有效性甚至高于股票——因为高杠杆下形态更加规整。',practical:'① 期货K线由于杠杆交易，多空更加均衡，形态更可信。② 连续合约需注意换月缺口。③ 重要数据公布前的"十字星"是强烈的观望信号。④ 主力合约K线比非主力可靠。',ref:'数据公布前30分钟K线常用十字星。连续合约需复权处理换月缺口。主力合约移仓换月前后1周K线可能失真。',combo:'K线+基差：基差极端+反转K线=高胜率。K线+持仓：底部大阳线+增仓=主力建仓。',case:'纯碱2023年7月1800附近出现周线"多方炮"（阴+阳+阳），放量增仓突破，确认牛市启动。原油2023年12月在72美元出现晨之星形态后开启上涨。',boundary:'连续合约的K线受换月影响可能失真。涨跌停时K线形态延迟反映。假期前后K线可能跳空。'},
      {id:'f-t-10',title:'期货MACD应用',brief:'MACD在期货上的背离信号比股票更灵敏——高杠杆放大价格波动。',practical:'① 顶背离（价新高+MACD未新高）+减仓=多头离场信号。② 底背离（价新低+MACD未新低）+增仓=主力抄底。③ 主力连续合约的MACD周线背离最有价值。',ref:'参数(12,26,9)标准。期货MACD背离信号约比股票提前1-3根K线（杠杆放大作用）。增仓底背离胜率约70%。',combo:'MACD+持仓量：MACD底背离+持仓开始增加=主力低位建仓。MACD+趋势线：MACD背离+趋势线突破=趋势逆转。',case:'2023年9月焦炭MACD周线底背离（价新低+MACD抬高）+持仓开始增加，此后从2300涨至2800。螺纹2023年Q1顶背离后从4200跌至3300。',boundary:'强趋势中MACD可长时间钝化。单边行情中背离可多次。主力连续合约的复权可能影响MACD计算。'},
      {id:'f-t-11',title:'期货支撑阻力',brief:'期货的支撑阻力更精确——交割逻辑和持仓成本使价格在关键位置的反应更干脆。',practical:'① 整数关口（原油80/90/100等）是强支撑阻力。② 前高前低、成交密集区是最有效的阻力支撑。③ 周线级别的支撑阻力位比日线可靠。④ 突破关键位后的回踩确认是入场时机。',ref:'期货整数关口惯性更强（心理价位+期权Gamma集中）。前高/前低突破后变为强支撑/阻力。',combo:'支撑阻力+基差：基差在支撑位附近走强=支撑有效。阻力+持仓：冲击阻力时持仓减少=突破可能性小。',case:'原油80美元/桶是强心理支撑——2023年5月首次触及反弹至97，2023年12月再次触及后反弹至85。螺纹3400是电炉成本支撑，2023年5月触及后反弹至3800。',boundary:'换月后关键位的价格需要调整（移仓换月可能位移）。算法交易可能制造假突破吃掉止损。'},
      {id:'f-t-12',title:'期货布林带与突破',brief:'商品期货的布林带收窄后的突破幅度通常大于股票——高杠杆+趋势性更强。',practical:'① 带宽<15%（期货标准）为收窄，<10%为极度收窄→准备大行情。② 开口扩张方向+增仓=突破方向。③ 布林上/下轨在期货中常作为反向交易参考（"沿着上轨做多"）。',ref:'期货布林带宽标准：螺纹<15%=收窄，<10%=极度收窄。原油<8%=极度收窄。突破后最小目标=2倍带宽。',combo:'布林+ADX：带宽扩张+ADX>25=趋势确认。布林+持仓：突破时放量增仓+布林开口=最强信号。',case:'纯碱2023年6月布林带宽从25%压缩至10%，随后向上开口，一个月内从1800涨至2600(+44%)，突破幅度远大于股票平均。',boundary:'铝、铜等外盘定价品种需结合伦交所交易时间。极端行情价格可远脱离轨道。'},
      {id:'f-t-13',title:'期货ADX与趋势强度',brief:'ADX在判别期货趋势强度上比股票更实用——期货的趋势性天然强于股票。',practical:'① ADX<20=震荡市→不做趋势策略或缩小周期。② ADX 25-40=趋势运行中→持有并移动止损。③ ADX>50=趋势加速（也可能是末端）→警惕反转。④ +DI> -DI=多头趋势；-DI>+DI=空头趋势。',ref:'原油ADX正常20-40。ADX从<20升至>25+方向确认=入场。ADX>50时逆向波动概率增加。',combo:'ADX+均线：ADX>25+均线多头排列=持有。ADX+布林：ADX从<20升>25+带宽扩张=突破确认。',diagram:D.adxChart,
case:'螺纹2023年Q3ADX从12升至32（趋势确立）+DI> -DI（多头），确认反弹趋势启动，从3300涨至3900。纯碱2023年7月ADX从10升至45，确认了暴涨趋势。',boundary:'ADX在快速波动的期货中可能滞后。ADX>60时趋势可能衰竭。不同品种ADX阈值不同。'},
      {id:'f-t-14',title:'期货量价分析进阶',brief:'期货的"量"（成交量+持仓量+仓单）三重验证提供比股票更丰富的信息。',practical:'① 成交量+持仓量同时增加=趋势得到确认。② 持仓量减少+价格大涨=空头回补（不可持续）。③ 仓单（交割库存）连续增加=近月压力增大。④ 仓单减少+持仓增加+价格上涨=最确定的做多组合。',ref:'仓单变化：连续3周增加或减少为趋势信号。仓单+持仓+量三重确认：同时两个指标同向=可靠。',combo:'量+价+仓三重共振：三个指标同向=80%+胜率。仓单+基差：仓单增加+正基差缩小=近月贴水压力。',case:'纯碱2023年7月仓单从1万吨降至0（无可交割货源）+持仓从50万增至100万+价格放量突破=最确定的做多信号，此后从1800涨至2600。',boundary:'仓单数据更新滞后。交易所库存与社会库存可能背离。逼仓行情中仓单急速变化。'},
      {id:'f-t-15',title:'程序化交易信号识别',brief:'识别和利用算法交易在期货市场留下的"脚印"——为手动交易者提供优势。',practical:'① 开盘前30分钟的高频交易痕迹：极端快速波动通常是算法。② 关键位的"幽灵报价"（大单挂单瞬间消失）=算法在试探。③ 尾盘最后5分钟的非正常波动=对冲/调仓。④ 识别算法策略后可利用其规律性。',ref:'高频策略主要关注开盘/收盘/数据公布时段。CTA策略主要影响收盘前30分钟（趋势跟踪策略常见的调仓时段）。',combo:'程序化信号+传统技术：在传统信号基础上叠加算法行为分析。程序化+持仓量：算法增仓的方向通常在1-3天内延续。',case:'螺纹钢每日9:00-9:15开盘振荡：高频策略在开盘1分钟内制造假突破→手动交易者可在9:15后观察真方向入场。2023年纯碱暴涨行情中，每日收盘前30分钟CTA趋势策略集中买入，尾盘拉升成为常态。',boundary:'算法策略在不断进化——去年的规律今年可能失效。识别算法需要复盘经验。部分算法策略（如做市商）提供流动性而非攻击性。'},
      {id:'f-t-16',title:'期货周期性规律',brief:'商品期货在合约月份/季节/交易时段上的周期性波动提供了额外的交易优势。',practical:'① 合约月份规律：远期合约流动性在近月交割前2周开始增加。② 时段规律：9:00-9:30波动最大（开盘博弈），14:30-15:00次之（尾盘调仓）。③ 周历规律：周初容易延续前周趋势，周末容易反转。④ 交割月前1月基差加速收敛。',ref:'9:00-9:30成交量占比全天15-20%。交割月前15天基差开始加速收敛。周五尾盘vs周一开盘的跳空概率约60%。',combo:'周期性+技术形态：在最佳时段内执行技术信号。周期性+量价规律：交割月基差收敛+量价背离。',case:'豆粕每年11-12月的1-5价差走强规律（天气炒作+消费旺季）+仓单下降=做多价差，成功率约70%。周五尾盘原油经常出现"周末避险"平仓（价格下跌），周一开盘回补（上涨）。',boundary:'新规则（交易时间变更/保证金调整）可能打破历史规律。交易所窗口指导可能改变市场行为。'},
    ]}
  }
};

    fundamental:{ icon:'📊', label:'基本面分析如何用', points:[
      {id:'i-f-1',title:'Top-Down 宏观框架',brief:'从宏观经济→行业→公司的自上而下分析法——决定"买什么"的核心框架。',practical:'① 第一步：判断经济周期位置（美林时钟/PMI/社融）。② 第二步：筛选受益行业（周期位置+政策方向）。③ 第三步：精选个股（护城河+估值+财务质量）。④ 每季度重新评估经济周期位置。',ref:'宏观经济指标优先级：PMI>社融>工业利润>CPI。行业筛选：受益于当前周期的前3个行业。个股筛选：ROE>15%+PE分位<50%。',combo:'Top-Down+技术面：宏观决定方向→技术面优化买入时间。先基本面选股→再技术面择时。',diagram:D.integrationDiagram,
case:'2020年3月：① 疫情后经济处于复苏早期（PMI从35回升至50+）。② 受益行业：消费（报复性消费）+科技（数字化加速）。③ 精选茅台（品牌护城河+不受外需影响）+宁德时代（新能源加速渗透）。④ 技术面：茅台2020年3月MACD底背离+放量突破MA20=买入。',boundary:'Top-Down在大牛市/大熊市中可能过度复杂——简单策略可能更好。对小盘股/新股适用性差。'},
      {id:'i-f-2',title:'财务报表三张核心表',brief:'资产负债表看安全、利润表看成长、现金流量表看真实——三张表交叉验证。',practical:'① 资产负债表：关注"有息负债率"（安全底线）和"应收/营收比"（回款能力）。② 利润表：毛利率趋势+费用率控制能力。③ 现金流量表：自由现金流=经营现金流-资本开支，与净利润的比值>80%为优。④ 三张表互验：净利增长但经营现金流下降="纸上富贵"。',ref:'安全：有息负债率<30%。盈利：毛利率稳定+费用率下降。真实：自由现金流/净利润>80%。危险：净利增+经营现金流降（盈利质量差）。',combo:'财报分析+估值：财报确认"好公司"+低估值=买入。财报趋势+ROE杜邦：财报改善在前→ROE提升在后。',case:'格力2021年：净利润-36%表面很差，但经营性现金流+95%、自由现金流飙升至历史高位。财报质量极好——股价从30元低估修复至40元。三张表的交叉验证揭示了真实经营状况。',boundary:'财报有3-4个月滞后。银行/保险等金融行业财报特殊（看不良率/准备金）。初创公司财报参考价值有限。'},
      {id:'i-f-3',title:'估值分位与历史对比',brief:'使用当前估值在历史中的分位位置判断"贵了还是便宜了"——最简单有效的估值方法。',practical:'① PE/PB的5年历史分位：<20%=低估区域，>80%=高估区域。② 估值分位+基本面验证：低估但盈利恶化="价值陷阱"。③ 估值分位在极值区（<5%或>95%）时胜率最高。④ 不同市场环境下的"正常PE"不同——利率低时PE中枢上移。',ref:'A股PE历史波动区间：上证10-25x，沪深300 10-20x。分位<20%买入持有1年的平均回报>15%，>80%买入的平均回报<5%。',combo:'估值分位+社融方向：低估值+社融回升=最佳买入组合。估值分位+RSI：低估值+RSI超卖=买入信号。',case:'2022年10月沪深300 PE 10.5x(1%分位)，PB 1.2x(1%分位)，极度低估。结合社融企稳，是明确买入区域，3个月反弹15%。2021年2月PE 17x(95%分位)+社融见顶=减仓信号。',boundary:'结构性变化（如注册制改革）改变PE中枢。历史分位在快速增长的公司上失效。周期股PE分位是反向指标。'},
      {id:'i-f-4',title:'基本面分析的操作纪律',brief:'基本面投资者最常见的错误及如何避免——比分析本身更重要。',practical:'① 买入前设定"卖出的条件"——基本面恶化标准（如毛利率连续2季下降）。② 分散到3-5个不同行业，单行业上限40%。③ 不要因为便宜而买入、不要因为涨了而卖出——以基本面为准。④ 每季度重检持仓——问自己"如果现在没买，会买吗？"',ref:'卖出条件：核心指标连续2季恶化、估值超过历史95%分位、发现更好的机会。仓位纪律：单只上限20%，行业上限40%。',combo:'基本面卖出+技术面配合：基本面卖出条件触发+技术面也破位=立即卖出。基本面卖出但技术面未破位=减半观察。',case:'2020年买入海天味业（PE 50→100x）：基本面不变但估值极度高估。设定卖出条件为PE>80x。2021年PE触及100x+技术面周线顶背离=卖出，此后从126跌至60。',boundary:'优质公司短期被严重低估是常见现象（也是超额收益来源）。卖出后可能继续涨。基本面分析的滞后性是最大软肋。'},
      {id:'i-f-5',title:'宏观数据日历与交易节奏',brief:'按经济数据发布节奏安排交易——数据发布前后是市场波动最大的窗口。',practical:'① 每月10-15日：中国社融/信贷数据（影响流动性预期）。② 每月最后一周：中国PMI数据（领先经济指标）。③ 每季月中：中国经济GDP+工业利润。④ 美联储FOMC一年8次——利率决议前后波动最大。⑤ 数据公布30分钟内不交易——等市场消化。',ref:'中国数据发布时间：PMI=每月最后一天，社融=每月10-15日，GDP=每季月中。美国：非农=每月第一周五，FOMC大月(3/6/9/12)含点阵图。',combo:'宏观数据+技术形态：数据前等待+数据后技术确认=最高胜率交易方式。数据前减仓观望是基本纪律。',case:'2023年8月中国PMI发布前3天：国债期货缩量横盘等待。数据公布后（PMI49.7弱于预期），确认经济继续放缓，T合约放量上涨。等待数据后的确认是专业投资者的基本素养。',boundary:'数据可能大幅修正（非农经常修正3000+）。市场可能提前预期（"买预期卖事实"）。突发事件（地缘事件）比数据更重要。'},
      {id:'i-f-6',title:'行业轮动策略',brief:'不同经济周期阶段对应不同行业风格——识别当前周期的领涨行业。',practical:'① 复苏初期：金融+周期(券商/银行/有色)。② 复苏加速：消费+科技(白酒/电子/新能源)。③ 过热期：资源(煤炭/石油/化工)+抗通胀题材。④ 衰退期：防御(公用事业/医药/消费必需品)。⑤ 转换信号：PMI拐点、PPI拐点、10Y国债收益率拐点。',ref:'PMI从<50回升至>50=复苏→买金融周期。PMI连续>52=加速→买消费科技。PPI>5%=过热→买资源。10Y利率从高位回落=衰退→买防御。',combo:'行业轮动+技术面：选对领涨行业+用技术面找该行业ETF的买卖点。轮动+估值分位：买在估值低位+轮动趋势确立时。',case:'2022年11月PMI低至48→2023年1月回升至50.1(复苏信号)，金融(券商涨20%)+周期(有色涨15%)领涨。2023年Q2PMI连续>52(加速)→消费(白酒涨10%)+科技(半导体涨20%)接力。',boundary:'行业轮动在极端行情(全面牛市/熊市)中失效。政策驱动(如碳中和)可逆周期轮动。轮动节奏越来越快(从半年缩短到季)。'},
    ]},
    technical:{ icon:'📈', label:'技术分析如何用', points:[
      {id:'i-t-1',title:'技术分析的"三层过滤"',brief:'用大中小三个周期分别定趋势/确认信号/执行入场——最系统的技术分析方法。',practical:'① 第一层(周线)：确定趋势方向——只做与大周期同向的交易。② 第二层(日线)：确认交易信号——均线金叉/形态突破/MACD金叉。③ 第三层(60分钟/日线K线)：选择精确入场点——回调至关键位+小周期反转。④ 三层一致时交易，不一致时等待。',ref:'三层一致性：周线多+日线多+60分钟多=最强买入。胜率：三层一致约70%，两层一致约55%，一层<50%。',combo:'三层过滤+基本面：三层技术面一致+基本面支持=极大概率交易。三层过滤+风险：三层过滤只用于入场，离场用独立规则（止损/目标位）。',case:'2023年Q4螺纹周线下降+日线反弹至阻力(3900)+小时线顶背离→三层一致看空。做空入场，一周跌至3700。如果周线和日线矛盾（周一多+日线空），不上仓位或观望。',boundary:'三层过滤在震荡市中长时间矛盾，导致观望期过长。不同品种的"大中小"周期定义不同。三层过滤不能解决"三层都错"的可能。'},
      {id:'i-t-2',title:'入场信号的五元素确认',brief:'一个可靠的入场信号需要五个因素同时验证——少一个就减半仓位。',practical:'① 趋势：均线或ADX确认趋势方向。② 形态：K线反转形态或突破形态出现。③ 量能：成交量配合放大。④ 指标：MACD/RSI等指标确认（金叉/背离）。⑤ 位置：在关键支撑/阻力位或回调位。',ref:'五元素中满足5个=全仓，4个=半仓，3个=轻仓(1/4)，<3个=观望。实盘交易者通常只做满足4个以上的交易。',combo:'五元素+基本面过滤：基本面顺（如行业向好）+技术面5元素确认=最优交易。基本面与技术面冲突（如基本面空+技术面多）=观望。',case:'纯碱2023年7月突破点：① 均线多头排列(趋势✓) ② 平台突破(形态✓) ③ 放量+50%(量能✓) ④ MACD零轴上金叉(指标✓) ⑤ 突破前1个月横盘积累(位置✓) →5元素全满足，全力做多。',boundary:'五元素同时满足的机会很少（可能一年几十次）。要求过高导致交易频率过低。不同品种的"量能"标准不同。'},
      {id:'i-t-3',title:'止损设置的三大原则',brief:'止损不是在亏多少时止损——而是在"趋势证明错了"时止损。',practical:'① 技术止损：放在关键支撑下方/阻力上方1-2ATR处（如做多放支撑下方2ATR）。② 时间止损：入场后N天内没有按预期方向走=出场。③ 资金止损：单笔亏损上限≤总资金1-2%。④ 止损只扩大不缩小（不可向下移动止损）。',ref:'技术止损：关键位外1-2ATR。时间止损：短线3天、波段7天、趋势14天无进展。资金止损：1%总资金。移动止损：保护性止损随利润扩大而上移。',combo:'止损+ATR：用ATR算技术止损的幅度。止损+仓位：根据止损幅度反向计算仓位（止损越小仓位越大）。',case:'2023年做多原油：入场92，止损设在关键支撑88(下方1.5ATR=4元)，资金止损=总资金1%=1000元。仓位=1000÷(4×1000桶)=0.25手。如果止损设4.5元，仓位=1000÷(4.5×1000)=0.22手。止损幅度×仓位=风险恒定。',boundary:'震荡市中技术止损容易被反复扫。过度优化止损位降低胜率。时间止损在趋势策略中可能导致过早出场。'},
      {id:'i-t-4',title:'离场策略比入场更重要',brief:'知道什么时候卖比知道什么时候买难10倍——完整的交易计划必须包含离场条件。',practical:'① 移动止损离场：趋势未坏一路持有（"让利润奔跑"）。② 目标位离场：提前设定止盈位（如1:3盈亏比）。③ 反转信号离场：趋势线破位/MACD顶背离/放量滞涨。④ 时间离场：持有超过预设周期=平仓。⑤ 至少使用"移动止损"+"目标位"两种离场的组合。',ref:'盈亏比策略：盈亏比1:3，胜率33%即可盈利。趋势跟踪：移动止损离场（10日低点/高点）是最常用的。',combo:'离场+多周期：大周期趋势仍在→用移动止损。大周期趋势可能结束→用反转信号离场。离场+仓位：减仓可能是比全仓更好的离场方式（先减半、留半）。',case:'原油2023年6月做多：计划盈亏比1:3（止损4→盈利12元）。价格到达96时触发目标位离场（+12元盈利），随后继续涨至97。虽然少赚了，但严格执行计划远比"贪心"重要。如果不想错过后面的行情，可以选择"减半+移动止损"。',boundary:'移动止损在剧烈波动中可能被滑点扫出。目标位策略可能错过"大趋势"。没有完美离场策略——选择最适合自己性格的方式。'},
      {id:'i-t-5',title:'技术指标的"二选一"原则',brief:'不要同时使用过多指标——两个互补指标足够，过多会产生矛盾信息。',practical:'① 趋势指标选一个：均线或MACD(二选一)。② 震荡指标选一个：RSI或KDJ或布林(三选一)。③ 确认指标：成交量(必看)。④ 两个指标+成交量=完整的技术分析系统。⑤ 选好指标组合后坚持使用，不要天天换。',ref:'建议组合：均线(趋势)+RSI(超买超卖)+成交量(确认)。或MACD(趋势)+布林(波动率)+成交量。',combo:'指标组合+基本面：技术面组合确认趋势→基本面确认方向→成交。',case:'有交易者同时看MACD/RSI/KDJ/布林/均线/ADX/OBV…——它们经常互相矛盾（MACD多但RSI超买），反而无法做出决策。专业交易者只用2-3个指标：如海龟只用"20日突破+10日止损+ATR仓位"。',boundary:'指标都是价格的衍生，太多了反而迷失。指标系统的稳定性比准确性重要。关键不是用什么指标，而是是否严格按系统执行。'},
      {id:'i-t-6',title:'高胜率交易时段的识别',brief:'不是所有时间都适合交易——识别高胜率时段是职业交易者的基本功。',practical:'① 开盘后30分钟（9:00-9:30）：成交量最大但假信号最多——等。② 上午10:00-11:00：趋势开始明朗——适合入场。③ 收盘前30分钟（14:30-15:00）：结算/调仓驱动——可操作但注意隔夜风险。④ 数据公布前后30分钟：极端波动——等数据后方向确认。⑤ 周五收盘前：趋势延续或反转的关键时间。',ref:'开盘30分钟波动大但方向不明——专业交易者等30分钟再交易。10:00-11:00是当日趋势最明确的时段。临近收盘不宜建新仓（隔夜风险）。',combo:'时段+技术信号：高胜率时段+技术信号确认=最佳交易窗口。时段避免在数据公布/开盘前30分钟新开仓。',case:'海龟交易法则中的"25日规则"之一：不在开盘第一小时和收盘最后一小时建仓——因为这两个时段波动率过高、假信号多。专业期货交易者通常在10:00-11:00执行主要交易。',boundary:'不同品种的最佳交易时间不同——国内夜盘（21:00-23:00）是有色/原油的活跃期。全天候市场（加密货币/外汇）无时段限制。'},
    ]},
    integration:{ icon:'🔗', label:'基本面+技术面如何结合', points:[
      {id:'i-c-1',title:'"基本面定方向，技术面定时点"',brief:'最基本也最有效的结合方式——基本面判断"买什么"，技术面判断"何时买"。',practical:'① 基本面分析：经济周期+行业趋势+公司估值→决定做多/做空方向。② 技术面分析：等回调到支撑/均线/布林下轨+技术指标确认→执行入场。③ 基本面看长期、技术面看短期——两者不矛盾时执行。④ 基本面方向为主，技术面入场为辅。',ref:'胜率：基本面+技术面结合≈65-75%，单独基本面≈55%，单独技术面≈50-55%。',combo:'基本面定买卖方向（宏观+估值）→技术面定买卖时机（回调到关键位+指标确认）。',diagram:D.integrationDiagram,
case:'2022年10月：基本面：沪深300 PE 10.5x(1%分位)+社融企稳=极度低估→做多。技术面：等回调至关键位(MACD底背离)+放量阳线确认→入场。基本面给了方向"现在就是低估区"，技术面给了时机"底部放量阳线买入"，两者完美结合。',boundary:'基本面与技术面持续矛盾时（如基本面空但技术面超跌反弹）→观望。基本面给出方向和仓位大小，技术面决定入场点（可能有偏差）。'},
      {id:'i-c-2',title:'基本面选股 + 技术面选时',brief:'世界上最成功的投资策略之一——巴菲特的估值买入+等待技术面低点。',practical:'① 用基本面筛选"好公司"（ROE>15%+低负债+现金流充裕）。② 等待技术面低点（回调至MA60/布林下轨/RSI<30）。③ 分批建仓：基本面触发(买入价低于合理估值)→技术面确认(放量阳线)→加仓。④ 基本面不变则长期持有，基本面恶化则技术面破位前减仓。',ref:'好公司标准：ROE(5年)>15%+毛利率稳定+有息负债率<30%+自由现金流>净利润80%。买入时机：技术回调至MA60或估值进入20%分位以下。',combo:'基本面持有（不止损于价格下跌但止损于基本面恶化）+技术面加仓（技术面好时加仓、差时持有不操作）。',case:'茅台2018年10月：① 基本面：ROE>30%+品牌护城河+现金流充裕=好公司。② 技术面：PE从40降到25(估值合理)，股价从792跌至500(回调至年线)。③ 分批：500一线建仓→底部放量阳线(技术确认)→加仓。此后涨至2600。',boundary:'基本面分析需要能够识别"好公司"的能力。技术面可能持续下跌（低估后更低估）——此时需耐心分批而非一把梭。'},
      {id:'i-c-3',title:'基本面改善 + 技术面突破',brief:'公司基本面出现拐点（盈利/行业/政策改善）+技术面放量突破=最强的买入信号。',practical:'① 识别基本面拐点：业绩预告大幅改善/行业反转/政策利好/新产品突破。② 等待技术面确认：放量突破关键阻力/平台/下降趋势线。③ 基本面拐点发生在技术面底部区域=最佳买点。④ 基本面改善但技术面尚未确认=提前建仓(高风险)。',ref:'基本面拐点确认：业绩预告超预期20%+、行业政策边际改善、毛利率连续2季回升。技术面确认：突破平台+放量>30%+MACD零轴上金叉。',combo:'基本面拐点+技术面底部=双重确认。仓位：双重确认=>70%仓位，单一确认=>30-40%。',case:'2023年7月纯碱：① 基本面拐点：库存降至历史低位+夏季检修减少供给+地产保交楼政策(需求改善)。② 技术面：放量+50%突破1800平台+MACD零轴上金叉。双重确认后从1800涨至2600。',boundary:'基本面拐点可能被证伪（如业绩改善只是一次性收益）。技术面突破可能是假突破。双重确认策略的问题是——等到技术面确认时价格已经涨了10-20%。'},
      {id:'i-c-4',title:'基本面支撑 + 技术面背离',brief:'基本面提供了估值/成本的"地板"或"天花板"，技术面背离给出反转时机。',practical:'① 基本面底部（估值低位/成本线/政策底）+技术面底背离=买入。② 基本面顶部（估值高位/满产/政策顶）+技术面顶背离=卖出。③ 基本面决定"是否该操作"，技术面决定"什么时候操作"。④ 基本面"地板"区域的技术背离信号胜率最高。',ref:'基本面底部:PE<20%分位或价格在成本线附近。技术面背离:MACD/RSI底背离。两者同时出现＝高胜率买入(约70-75%)。',combo:'基本面底部+技术面多重背离(RSI+MACD同时背离)=极高胜率(>80%)。',case:'2022年10月焦煤：① 基本面：价格跌至1300(低于完全成本线1400)=成本支撑底部。② 技术面：MACD周线底背离+RSI<20=双重背离。底部+背离=做多信号，此后从1300反弹至2000(+54%)。',boundary:'基本面底部可能长时间持续（"地板下面有地下室"）。技术面背离在强趋势中可多次出现。'},
      {id:'i-c-5',title:'基本面恶化 + 技术面破位',brief:'基本面出现风险信号+技术面关键位被跌破=无条件离场的最高优先级信号。',practical:'① 基本面恶化：盈利下调/评级下调/行业政策收紧/高管减持。② 技术面破位：跌破MA60/跌破趋势线/跌破关键支撑位。③ 双重确认时：立即减仓至少50%。④ 单一确认时：减仓30%并提高警惕。',ref:'基本面恶化优先级：盈利预期下调>评级降级>政策风险>高管减持。技术面破位优先级：跌破年线>跌破趋势线>跌破MA60>跌破支撑。',combo:'基本面恶化+技术面破位=无条件离场。不要等"再看一下"——历史数据显示双重确认后继续下跌的概率>70%。',case:'2021年12月腾讯：① 基本面：游戏监管+反垄断政策冲击(盈利预期从+20%下调至+5%)。② 技术面：跌破MA60(550港元)+跌破年线(500港元)。双重确认后从550跌至200。如果在双重确认时（约500）离场，可以避免60%以上的跌幅。',boundary:'基本面恶化可能已被市场提前定价（"利空出尽"）。技术面破位可能是假跌破（洗盘）。但双重确认时先行减仓永远是正确的风险控制。'},
      {id:'i-c-6',title:'多资产多指标共振系统',brief:'同时看多个资产类的技术面形态和基本面信号——共振时胜率极高。',practical:'① 同时检查：股票(市场整体)、债券(利率预期)、商品(通胀)、汇率(资金流向)。② 四个市场同步发出同向信号=最强交易信号（一年可能只出现几次）。③ 各市场信号矛盾时=减少交易或只做对冲策略。④ 检查顺序：美林时钟定位→跨市场验证→品种确认。',ref:'四市场信号一致=极高胜率。信号一致性评分：4/4=全仓，3/4=半仓，2/4=轻仓或观望。',combo:'跨市场+基本面+技术面三重共振=最佳交易（可能一年10次以下）。',diagram:D.crossMarket,
case:'2023年Q4：① 股票(标普500)RSI从超卖回升→做多信号。② 债券(TLT)MACD底背离→利率见顶。③ 商品(原油)ADX>25+趋势向下→需求疲软。④ 美元指数从高位回落→风险偏好回升。三市场(股+债+美元)共振=做多股票+债券，2024Q1标普+10%、TLT+15%。',boundary:'跨市场信号共振机会稀少（一年几次），不适合高频交易者。四个市场的信号解读有一定主观性。'},
      {id:'i-c-7',title:'交易计划的制定与执行',brief:'一个完整的交易计划应该包含什么——"计划你的交易，交易你的计划"。',practical:'① 入场条件：基本面方向+技术面信号（具体到哪个指标什么数值）。② 仓位：用凯利或固定风险（每笔1%）。③ 止损位：具体到价格（技术止损位下方）。④ 初始目标：盈亏比至少1:2（最好1:3）。⑤ 移动止损规则：盈利到一定幅度后将止损移至成本。⑥ 检查清单：进场前逐项核对，缺一项就不做。',ref:'交易计划模板：品种→方向→入场条件(基本面+技术面)→仓位(风险%)→止损价→目标价→移动止损条件→离场条件。',combo:'计划+复盘：每次交易后复盘——"是否按计划执行"比"是否盈利"更重要。严格执行计划的交易即使亏损也是"好交易"。',case:'原油做多计划：① 入场：跌破成本线(基本面)+日线底背离(技术面)⇒入场。② 仓位：1%风险。③ 止损：在关键支撑位下方2ATR。④ 目标：盈亏比1:3。⑤ 移动止损：盈利>止损的1.5倍后止损移至成本价。⑥ 结果：严格执行，即使1/3胜率，长期仍正期望。',boundary:'市场突发事件可能使计划完全失效——此时必须无条件离场（"计划赶不上变化"）。过于僵化执行计划可能错过市场变化。'},
      {id:'i-c-8',title:'复盘的四个维度',brief:'交易后必须复盘——比交易本身更重要。不复盘的交易者进步缓慢。',practical:'① 复盘入场：是否符合计划？信号是否足够强？② 复盘持仓：中间有没有情绪化操作（害怕/贪婪）？③ 复盘离场：是否按计划？如果提前离场/延迟离场是什么原因？④ 复盘系统：这个策略的胜率和盈亏比是否符合预期？需要调整参数吗？',ref:'复盘频率：每日10分钟快速回顾，每周30分钟深入复盘，每月1小时策略层面复盘。记录：记录每笔交易的计划和实际执行。',combo:'复盘+改进：每次复盘找到1个可以改进的点。不断地通过复盘优化策略。',case:'复盘案例：某交易者发现其MACD背离策略胜率仅40%（低于预期的55%）。复盘发现：只在日线用、没有结合成交量。改为"日线+成交量确认"后胜率提升至55%。如果没有复盘，就会一直用低胜率策略。',boundary:'复盘不要过度优化（"曲线拟合"）。过分关注短期盈亏而忽视长期策略有效性。情绪复盘比技术复盘更难但更重要。'},
      {id:'i-c-9',title:'不同时间框架的策略选择',brief:'不同持仓周期需要完全不同的分析框架和交易策略——长线短线不通用。',practical:'① 日内(持仓几分钟到几小时)：只看技术面（1小时/15分钟线），不看基本面。② 波段(持仓几天到几周)：技术面为主+基本面的关键事件（财报/数据）。③ 趋势(持仓几周到几个月)：技术面趋势跟踪+基本面方向确认。④ 投资(持仓半年以上)：基本面为主+技术面辅助择时。',ref:'时间框架划分：日内的数据周期用60分钟/15分钟，波段用日线，趋势用日线/周线，投资用周线/月线+基本面的季度更新。',combo:'长线定方向（周线/月线判断趋势）→短线找入场（小时/日线找回调低点）。不同时间框架的策略不能混用。',case:'日内交易员只看K线和成交量——基本面对他们毫无意义。巴菲特只看基本面——技术面对他也没意义。而结合交易者：用基本面选好公司(投资级)+等技术线回调到年线(波段级)买入+持有(趋势级)——同一个股票但不同层级的策略。',boundary:'一个策略不能同时用于多个时间框架。日内策略的胜率不能用于判断长期投资。选择适合自己性格和时间的策略比选择"最赚钱"的策略更重要。'},
      {id:'i-c-10',title:'交易心态的核心原则',brief:'交易80%是心态——没有好的心态再好的分析方法也无法执行。',practical:'① 接受亏损是交易的一部分——每笔交易都是独立的概率事件。② 不要因为连续亏损而加仓（"翻本心态"是最危险的）。③ 不要因为连续盈利而加仓（"自大心态"）。④ 记录每笔交易的情绪状态——识别自己的"情绪模式"。⑤ 亏损超过20%总资金时停止交易至少1周。',ref:'连续亏损3次：减半仓位。连续亏损5次：暂停交易1周。盈利>30%：提取部分利润。每天最大亏损容忍度：单日≤总资金3%。',combo:'心态+计划：严格按计划执行是克服情绪最好的方法。心态+复盘：复盘中发现情绪问题比技术问题更重要。',case:'著名海龟交易员的教训：连续6次亏损后加双倍仓位（想一次赚回来）→遇到第7次亏损→仓位过大爆仓。如果严格按1%风险开仓，连续10次亏损也只亏10%。交易中最重要的不是"这次能赚多少"，而是"这次会亏多少"。',boundary:'每个人都有自己的心理弱点——识别弱点比克服弱点更重要。"用系统代替意志力"——设计一个不需要意志力就可以执行的系统。'},
    ]}
  }
};

// ==================== 渲染引擎 ====================
const contentEl = document.getElementById('content');
const tabs = document.querySelectorAll('.tab');
const progressFill = document.getElementById('progressFill');
const globalProgressFill = document.getElementById('globalProgressFill');
const globalPct = document.getElementById('globalPct');

let learnedMap = {};

async function initProgress() {
  learnedMap = await loadAllProgress();
  updateAllProgress();
}

function toggleLearned(id, btn, titleEl) {
  const newVal = !learnedMap[id];
  learnedMap[id] = newVal;
  saveProgress(id, newVal);
  btn.classList.toggle('learned', newVal);
  titleEl.classList.toggle('learned', newVal);
  updateAllProgress();
}

function updateAllProgress() {
  // 计算总进度
  let total = 0, done = 0;
  Object.keys(data).forEach(mk => {
    Object.keys(data[mk].threads).forEach(tk => {
      data[mk].threads[tk].points.forEach(pt => {
        total++;
        if (learnedMap[pt.id]) done++;
      });
    });
  });
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  globalProgressFill.style.width = pct + '%';
  globalPct.textContent = pct + '%';
}

function renderModule(key) {
  const mod = data[key];
  if (!mod) return '';
  let html = `<div class="module active" data-module="${key}">`;
  for (const [tk, th] of Object.entries(mod.threads)) {
    const doneCount = th.points.filter(pt => learnedMap[pt.id]).length;
    html += `<div class="thread-header"><div class="icon ${tk}">${th.icon}</div><h2>${th.label}</h2><span class="count">${th.points.length} 个知识点</span><span class="thread-progress"><span class="done">${doneCount}</span>/${th.points.length}</span></div>`;
    th.points.forEach((pt, i) => {
      const isLearned = !!learnedMap[pt.id];
      html += `<div class="card-wrap" data-id="${pt.id}"><div class="card" data-point-id="${pt.id}">
        <div class="card-header">
          <span class="learn-toggle${isLearned?' learned':''}" data-id="${pt.id}">${isLearned?'✓':''}</span>
          <span class="num">${i+1}</span>
          <span class="title${isLearned?' learned':''}">${pt.title}</span>
          <span class="arrow">▼</span>
        </div>
        <div class="card-body">
          <div class="brief">${pt.brief}</div>
          <div class="section-label">🎯 实战操作指南</div>
          <div class="practical-box">${pt.practical}</div>
          <div class="section-label">📏 关键数值参考</div>
          <div class="ref-box">${pt.ref}</div>
          <div class="section-label">🔗 多指标组合</div>
          <div class="combo-box">${pt.combo}</div>
          ${pt.diagram ? `<div class="diagram-box">${pt.diagram}<div class="diagram-caption">↑ 图解说明</div></div>` : ''}
          <div class="tag-case">📋 实战案例</div>
          <div class="case-box">${pt.case}</div>
          <div class="tag-boundary">⚠️ 使用边界</div>
          <div class="boundary-box">${pt.boundary}</div>
        </div>
      </div></div>`;
    });
  }
  html += '</div>';
  return html;
}

function switchModule(key) {
  tabs.forEach(t => t.classList.toggle('active', t.dataset.module === key));
  contentEl.innerHTML = renderModule(key);
  // 绑定学习标记
  contentEl.querySelectorAll('.learn-toggle').forEach(el => {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      const id = this.dataset.id;
      const card = this.closest('.card');
      const title = card.querySelector('.title');
      toggleLearned(id, this, title);
      // 更新线程进度
      const header = card.closest('.module').querySelector('.thread-header');
      if (header) {
        const sp = header.querySelector('.thread-progress');
        if (sp) {
          let d = 0, t = 0;
          const modKey = key;
          let found = false;
          for (const [tk, th] of Object.entries(data[modKey].threads)) {
            for (const pt of th.points) {
              if (pt.id === id) { found = true; break; }
            }
            if (found) {
              const doneC = th.points.filter(p => learnedMap[p.id]).length;
              sp.innerHTML = `<span class="done">${doneC}</span>/${th.points.length}`;
              break;
            }
          }
        }
      }
    });
  });
  // 绑定卡片展开
  contentEl.querySelectorAll('.card-header').forEach(h => {
    h.addEventListener('click', function() {
      // 如果点的是学习按钮就不展开
      if (event.target.closest('.learn-toggle')) return;
      this.closest('.card').classList.toggle('open');
    });
  });
  setTimeout(() => {
    if (observer) observer.disconnect();
    observeCards();
  }, 50);
}

let observer = null;
function observeCards() {
  observer = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); observer.unobserve(e.target); } });
  }, { threshold: 0.06, rootMargin: '0px 0px -20px 0px' });
  document.querySelectorAll('.card-wrap').forEach(el => {
    if (!el.classList.contains('visible')) observer.observe(el);
    else el.classList.add('visible');
  });
}

// Tab切换
tabs.forEach(tab => {
  tab.addEventListener('click', function() {
    switchModule(this.dataset.module);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});

// 滚动进度条
window.addEventListener('scroll', function() {
  const h = document.documentElement.scrollHeight - window.innerHeight;
  if (h > 0) progressFill.style.width = Math.min(100, (window.scrollY / h) * 100) + '%';
}, { passive: true });

// 哈希导航
function initFromHash() {
  var hash = window.location.hash.replace('#', '');
  if (hash && data[hash]) switchModule(hash);
}
window.addEventListener('hashchange', function() {
  var hash = window.location.hash.replace('#', '');
  if (hash && data[hash]) switchModule(hash);
});

// ======================== 启动 ========================
initProgress().then(() => {
  initFromHash();
  switchModule(location.hash.replace('#','') || 'stocks');
  updateAllProgress();
});

// ======================== 设置系统（字号 + 主题 + 面板） ========================
(function() {
  var sizeCSS = {
    s: '.header h1{font-size:20px!important}.header .subtitle{font-size:10px!important}.tabs .tab{font-size:11px!important;padding:10px 4px 8px!important}.thread-header h2{font-size:13px!important}.card-header .title{font-size:12px!important}.card-body .brief{font-size:11px!important}.card-body .practical-box,.card-body .ref-box,.card-body .combo-box,.card-body .case-box,.card-body .boundary-box{font-size:10.5px!important}.card-body .section-label{font-size:9px!important}.global-progress{font-size:9px!important}',
    m: '.header h1{font-size:24px!important}.header .subtitle{font-size:12px!important}.tabs .tab{font-size:13px!important}.thread-header h2{font-size:15px!important}.card-header .title{font-size:13.5px!important}.card-body .brief{font-size:12.5px!important}.card-body .practical-box,.card-body .ref-box,.card-body .combo-box,.card-body .case-box,.card-body .boundary-box{font-size:12px!important}.card-body .section-label{font-size:10px!important}.global-progress{font-size:11px!important}',
    l: '.header h1{font-size:28px!important}.header .subtitle{font-size:14px!important}.tabs .tab{font-size:15px!important;padding:14px 8px 12px!important}.thread-header h2{font-size:17px!important}.card-header .title{font-size:15.5px!important}.card-body .brief{font-size:14px!important}.card-body .practical-box,.card-body .ref-box,.card-body .combo-box,.card-body .case-box,.card-body .boundary-box{font-size:13.5px!important}.card-body .section-label{font-size:11px!important}.global-progress{font-size:12px!important}'
  };
  var styleEl = null;
  function applySizeCSS(css) {
    if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'font-size-override'; document.head.appendChild(styleEl); }
    styleEl.textContent = css;
  }

  // 恢复保存的设置
  var savedSize = localStorage.getItem('tradeMapFontSize') || 'm';
  var savedTheme = localStorage.getItem('tradeMapTheme') || 'light';
  applySizeCSS(sizeCSS[savedSize] || sizeCSS.m);
  if (savedTheme === 'dark') document.body.classList.add('dark');

  // === 全局函数 ===

  // 字号
  window.setFontSize = function(size) {
    localStorage.setItem('tradeMapFontSize', size);
    applySizeCSS(sizeCSS[size] || sizeCSS.m);
    // 刷新设置面板按钮状态
    document.querySelectorAll('.size-btn').forEach(function(b) {
      var active = b.dataset.size === size;
      b.style.borderColor = active ? 'var(--gold)' : 'var(--border)';
      b.style.color = active ? 'var(--gold)' : 'var(--text-secondary)';
      b.style.fontWeight = active ? '600' : '500';
    });
  };

  // 主题
  window.setTheme = function(theme) {
    localStorage.setItem('tradeMapTheme', theme);
    document.body.classList.toggle('dark', theme === 'dark');
    // 刷新 meta theme-color
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = theme === 'dark' ? '#121418' : '#1a1a2e';
    // 刷新设置面板按钮
    document.querySelectorAll('.theme-btn').forEach(function(b) {
      var active = b.dataset.theme === theme;
      b.style.borderColor = active ? 'var(--gold)' : 'var(--border)';
      b.style.color = active ? 'var(--gold)' : 'var(--text-secondary)';
      b.style.fontWeight = active ? '600' : '500';
    });
  };

  // 设置面板
  window.toggleSettings = function() {
    var panel = document.getElementById('settingsPanel');
    var isOpen = panel.style.display !== 'none';
    panel.style.display = isOpen ? 'none' : 'block';
    document.body.style.overflow = isOpen ? '' : 'hidden';
    // 同步按钮状态
    if (!isOpen) syncSettingBtns();
  };
  window.closeSettings = function(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('settingsPanel').style.display = 'none';
    document.body.style.overflow = '';
  };

  // 同步设置面板按钮的高亮状态
  function syncSettingBtns() {
    var curSize = localStorage.getItem('tradeMapFontSize') || 'm';
    var curTheme = localStorage.getItem('tradeMapTheme') || 'light';
    document.querySelectorAll('.size-btn').forEach(function(b) {
      var active = b.dataset.size === curSize;
      b.style.borderColor = active ? 'var(--gold)' : 'var(--border)';
      b.style.color = active ? 'var(--gold)' : 'var(--text-secondary)';
      b.style.fontWeight = active ? '600' : '500';
    });
    document.querySelectorAll('.theme-btn').forEach(function(b) {
      var active = b.dataset.theme === curTheme;
      b.style.borderColor = active ? 'var(--gold)' : 'var(--border)';
      b.style.color = active ? 'var(--gold)' : 'var(--text-secondary)';
      b.style.fontWeight = active ? '600' : '500';
    });
  }
})();

// PWA Service Worker 注册 + 更新检测
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js', { scope: './' }).then(function(reg) {
      console.log('SW registered:', reg.scope);
      // 检测到新 SW 就刷新
      reg.addEventListener('updatefound', function() {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', function() {
          if (newSW.state === 'activated') {
            console.log('New SW activated, reloading...');
            window.location.reload();
          }
        });
      });
    }, function(err) {
      console.log('SW failed:', err);
    });
  });
}

// 清除所有缓存并强制刷新
function clearCacheAndReload() {
  closeSettings();
  if ('caches' in window) {
    caches.keys().then(function(names) {
      return Promise.all(names.map(function(name) { return caches.delete(name); }));
    }).then(function() {
      if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
        navigator.serviceWorker.getRegistration().then(function(reg) { if (reg) reg.unregister(); });
      }
      window.location.reload(true);
    }).catch(function() {
      window.location.reload(true);
    });
  } else {
    window.location.reload(true);
  }
}
</script>
