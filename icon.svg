<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d4a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- K线 -->
  <rect x="120" y="240" width="32" height="120" rx="3" fill="#22c55e"/>
  <line x1="136" y1="200" x2="136" y2="240" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <line x1="136" y1="360" x2="136" y2="380" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <!-- K线2 -->
  <rect x="200" y="190" width="32" height="80" rx="3" fill="#22c55e"/>
  <line x1="216" y1="150" x2="216" y2="190" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <line x1="216" y1="270" x2="216" y2="300" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <!-- K线3 -->
  <rect x="280" y="150" width="32" height="50" rx="3" fill="#22c55e"/>
  <line x1="296" y1="120" x2="296" y2="150" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <line x1="296" y1="200" x2="296" y2="240" stroke="#22c55e" stroke-width="4" stroke-linecap="round"/>
  <!-- 均线 -->
  <polyline points="120,300 170,270 220,230 270,190 320,170 370,150" fill="none" stroke="#c8a44a" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- 三角标注 -->
  <polygon points="370,130 355,150 385,150" fill="#c8a44a"/>
  <text x="370" y="125" font-family="Georgia,serif" font-size="20" fill="#c8a44a" text-anchor="middle" font-weight="bold">▲</text>
  <!-- 黄金分割线装饰 -->
  <line x1="50" y1="360" x2="110" y2="360" stroke="#c8a44a" stroke-width="2" opacity="0.4"/>
  <line x1="400" y1="160" x2="460" y2="160" stroke="#c8a44a" stroke-width="2" opacity="0.4"/>
  <!-- 文字 -->
  <text x="256" y="440" font-family="'PingFang SC',-apple-system,sans-serif" font-size="48" fill="#ffffff" text-anchor="middle" font-weight="600" letter-spacing="4">交易地图</text>
</svg>
